<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Think Like a Marketing Strategist: Grow This Brand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#080c14;--bg1:#0d1220;--bg2:#111a2c;--bg3:#172035;
  --line:#1e2d46;--line-s:#19253a;
  --t0:#edf0fc;--t1:#8fa3c5;--t2:#4a5e7a;
  --blue:#1a56ff;--blue-s:#4074ff;
  --teal:#00c2a8;--teal-s:#27dbbf;
  --amber:#ffb020;--red:#ff3d5a;--green:#2fce7a;
  --purple:#9b6bff;--pink:#ff5fa0;
  --shadow:0 24px 64px -16px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;background:radial-gradient(ellipse at 20% 0%,#0e1828 0%,var(--bg0) 55%);color:var(--t0);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
#root{min-height:100vh;}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em;margin:0;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg1);}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px;}
::selection{background:var(--blue);color:#fff;}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
.mono{font-family:'JetBrains Mono',monospace;}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:80;background:rgba(8,12,20,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line-s);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tb-brand{display:flex;align-items:center;gap:10px;}
.tb-mark{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;}
.tb-name{font-weight:700;font-size:14px;color:var(--t0);}
.tb-name span{color:var(--t2);font-weight:500;}
.tb-progress{display:flex;align-items:center;gap:5px;}
.tb-dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:all .4s;}
.tb-dot.done{background:var(--teal);}
.tb-dot.active{background:var(--blue-s);width:20px;border-radius:4px;}
.tb-step{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.07em;margin-right:8px;}

/* SHELL */
.shell{max-width:1100px;margin:0 auto;padding:32px 20px 80px;}

/* CARDS */
.card{background:linear-gradient(160deg,var(--bg2),var(--bg1));border:1px solid var(--line-s);border-radius:16px;padding:20px 22px;transition:transform .22s,border-color .22s,box-shadow .22s;}
.card:hover{transform:translateY(-2px);border-color:var(--line);box-shadow:var(--shadow);}
.card-sm{border-radius:12px;padding:14px 16px;}

/* GRID */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr;}}
@media(max-width:700px){.g2{grid-template-columns:1fr;}}

/* CONCEPT BOX */
.concept-box{border-radius:14px;border:1px solid rgba(0,194,168,.28);background:linear-gradient(160deg,rgba(0,194,168,.07),var(--bg1));padding:18px 20px;margin-bottom:16px;}
.concept-eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--teal-s);font-weight:700;margin-bottom:8px;}
.concept-box p{font-size:13.5px;color:var(--t1);line-height:1.65;}
.concept-box p b{color:var(--t0);}
.concept-box p + p{margin-top:8px;}

/* WHY BOX */
.why-box{border-radius:12px;border:1px dashed var(--line);background:rgba(26,86,255,.05);padding:14px 16px;display:flex;gap:10px;margin:14px 0;}
.why-ico{flex-shrink:0;width:24px;height:24px;border-radius:7px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#fff;font-family:'Space Grotesk',sans-serif;}
.why-txt{font-size:13px;color:var(--t1);line-height:1.6;}
.why-txt b{color:var(--t0);}

/* CLAUDE PROMPT CARD */
.claude-card{border-radius:16px;border:1px solid rgba(155,107,255,.35);background:linear-gradient(160deg,rgba(155,107,255,.09),var(--bg1));padding:18px 20px;margin-top:24px;}
.claude-card-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.claude-badge{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);font-weight:700;background:rgba(155,107,255,.15);border:1px solid rgba(155,107,255,.3);border-radius:999px;padding:3px 10px;}
.claude-card-label{font-size:12px;color:var(--t1);}
.claude-prompt-block{background:rgba(0,0,0,.25);border-radius:10px;padding:13px 15px;border:1px solid rgba(155,107,255,.2);font-family:'JetBrains Mono',monospace;font-size:12px;color:#c8b8f5;line-height:1.6;white-space:pre-wrap;word-break:break-word;margin-top:10px;}
.claude-tip{font-size:12px;color:var(--t2);margin-top:8px;font-style:italic;}

/* SECTION HEADER */
.sec-head{margin-bottom:6px;}
.sec-head h2{font-size:24px;font-weight:700;}
.sec-head p{font-size:14px;color:var(--t1);margin-top:6px;line-height:1.55;max-width:680px;}

/* PILL */
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;font-size:11.5px;font-weight:600;border:1px solid var(--line);background:var(--bg3);color:var(--t1);}
.pill.blue{background:rgba(26,86,255,.12);color:var(--blue-s);border-color:rgba(26,86,255,.35);}
.pill.teal{background:rgba(0,194,168,.12);color:var(--teal-s);border-color:rgba(0,194,168,.35);}
.pill.amber{background:rgba(255,176,32,.12);color:var(--amber);border-color:rgba(255,176,32,.35);}
.pill.red{background:rgba(255,61,90,.12);color:var(--red);border-color:rgba(255,61,90,.35);}
.pill.purple{background:rgba(155,107,255,.12);color:var(--purple);border-color:rgba(155,107,255,.35);}
.pill.green{background:rgba(47,206,122,.12);color:var(--green);border-color:rgba(47,206,122,.35);}

/* BUTTONS */
.btn{appearance:none;border:none;cursor:pointer;border-radius:12px;padding:12px 22px;font-weight:600;font-size:14px;transition:transform .15s,box-shadow .15s,background .2s,opacity .2s;font-family:'Inter',sans-serif;}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--blue-s));color:#fff;box-shadow:0 8px 24px -8px rgba(26,86,255,.55);}
.btn-primary:hover{box-shadow:0 10px 30px -6px rgba(26,86,255,.7);transform:translateY(-1px);}
.btn-secondary{background:var(--bg3);color:var(--t0);border:1px solid var(--line);}
.btn-secondary:hover{border-color:var(--blue-s);color:#fff;}
.btn-teal{background:linear-gradient(135deg,#007a6b,var(--teal));color:#fff;box-shadow:0 8px 22px -8px rgba(0,194,168,.4);}
.btn-teal:hover{box-shadow:0 10px 28px -6px rgba(0,194,168,.55);transform:translateY(-1px);}
.btn-purple{background:linear-gradient(135deg,#6a42cc,var(--purple));color:#fff;box-shadow:0 8px 22px -8px rgba(155,107,255,.4);}
.btn-purple:hover{box-shadow:0 10px 28px -6px rgba(155,107,255,.55);transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.footer-btns{display:flex;justify-content:center;gap:12px;margin-top:32px;flex-wrap:wrap;}

/* FORMS */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--t1);margin-bottom:7px;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:11px 14px;color:var(--t0);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--blue-s);}
.form-input::placeholder{color:var(--t2);}
textarea.form-input{resize:vertical;min-height:80px;line-height:1.5;}

/* SELECTABLE CARDS */
.sel-card{border-radius:14px;border:1px solid var(--line-s);background:var(--bg2);padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;}
.sel-card:hover{border-color:var(--blue-s);transform:translateY(-2px);}
.sel-card.selected{border-color:var(--teal);background:linear-gradient(160deg,rgba(0,194,168,.11),var(--bg2));box-shadow:0 0 0 1px var(--teal) inset;}
.sel-card.disabled{opacity:.4;cursor:not-allowed;transform:none;}
.sel-check{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .2s;}
.sel-card.selected .sel-check{background:var(--teal);border-color:var(--teal);color:#04100b;}
.sel-card h4{font-size:14.5px;padding-right:24px;margin-bottom:5px;}
.sel-card p{font-size:12.5px;color:var(--t1);line-height:1.5;}

/* PROGRESS BAR */
.bar-track{height:9px;background:var(--bg3);border-radius:5px;overflow:hidden;border:1px solid var(--line-s);}
.bar-fill{height:100%;border-radius:5px;transition:width 1s cubic-bezier(.22,.9,.3,1);}
.bar-blue{background:linear-gradient(90deg,var(--blue),var(--blue-s));}
.bar-teal{background:linear-gradient(90deg,var(--teal),var(--teal-s));}
.bar-green{background:linear-gradient(90deg,#1aaa60,var(--green));}
.bar-amber{background:linear-gradient(90deg,#cc8800,var(--amber));}
.bar-red{background:linear-gradient(90deg,#cc2040,var(--red));}
.bar-purple{background:linear-gradient(90deg,#6a42cc,var(--purple));}

/* MODE CARDS (welcome) */
.mode-card{border-radius:18px;border:1px solid var(--line-s);background:var(--bg2);padding:24px;cursor:pointer;transition:all .22s;text-align:center;}
.mode-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
.mode-card.selected{border-color:var(--teal);background:linear-gradient(160deg,rgba(0,194,168,.12),var(--bg2));}
.mode-emoji{font-size:36px;margin-bottom:12px;display:block;}
.mode-card h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.mode-card p{font-size:12.5px;color:var(--t1);line-height:1.55;}

/* PLATFORM FIT */
.plat-card{border-radius:14px;border:1px solid var(--line-s);background:var(--bg2);padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;}
.plat-card:hover{border-color:var(--blue-s);transform:translateY(-2px);}
.plat-card.selected{border-color:var(--teal);background:linear-gradient(160deg,rgba(0,194,168,.1),var(--bg2));}
.plat-card.disabled{opacity:.45;cursor:not-allowed;}
.plat-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.plat-icon{font-size:22px;}
.plat-name{font-size:14.5px;font-weight:700;}
.plat-fit{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:2px 8px;border-radius:6px;margin-left:auto;}
.fit-high{background:rgba(47,206,122,.15);color:var(--green);}
.fit-med{background:rgba(255,176,32,.15);color:var(--amber);}
.fit-low{background:rgba(255,61,90,.15);color:var(--red);}
.plat-card p{font-size:12px;color:var(--t1);line-height:1.5;margin-bottom:8px;}
.plat-tags{display:flex;flex-wrap:wrap;gap:5px;}
.plat-tag{font-size:10.5px;padding:2px 8px;border-radius:5px;background:var(--bg3);color:var(--t2);border:1px solid var(--line-s);}

/* PILLAR */
.pillar-card{border-radius:14px;border:1px solid var(--line-s);background:var(--bg2);padding:16px 18px;cursor:pointer;transition:all .2s;position:relative;}
.pillar-card:hover{border-color:var(--blue-s);transform:translateY(-2px);}
.pillar-card.selected{border-color:var(--teal);background:linear-gradient(160deg,rgba(0,194,168,.1),var(--bg2));}
.pillar-card.disabled{opacity:.4;cursor:not-allowed;}
.pillar-emoji{font-size:24px;margin-bottom:10px;display:block;}
.pillar-card h4{font-size:14px;font-weight:700;margin-bottom:6px;padding-right:26px;}
.pillar-card p{font-size:12px;color:var(--t1);line-height:1.5;}
.pillar-card .goal-tag{display:inline-flex;margin-top:8px;font-size:10.5px;padding:2px 9px;border-radius:5px;background:rgba(26,86,255,.12);color:var(--blue-s);border:1px solid rgba(26,86,255,.25);}

/* ROADMAP */
.week-card{border-radius:14px;border:1px solid var(--line-s);background:var(--bg2);padding:18px 20px;margin-bottom:14px;}
.week-card.w1{border-color:rgba(26,86,255,.3);}
.week-card.w2{border-color:rgba(0,194,168,.3);}
.week-card.w3{border-color:rgba(155,107,255,.3);}
.week-card.w4{border-color:rgba(255,176,32,.3);}
.week-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.week-badge{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:#fff;flex-shrink:0;}
.wb1{background:linear-gradient(135deg,var(--blue),var(--blue-s));}
.wb2{background:linear-gradient(135deg,#007a6b,var(--teal));}
.wb3{background:linear-gradient(135deg,#6a42cc,var(--purple));}
.wb4{background:linear-gradient(135deg,#cc8800,var(--amber));}
.week-meta h4{font-size:15px;font-weight:700;}
.week-meta span{font-size:12px;color:var(--t2);}
.week-goals{list-style:none;display:flex;flex-direction:column;gap:7px;}
.week-goal{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:var(--t1);line-height:1.5;}
.wg-dot{flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--teal);margin-top:6px;}
.week-note{margin-top:12px;padding:10px 14px;background:rgba(255,255,255,.03);border-left:2px solid var(--line);border-radius:0 8px 8px 0;font-size:12.5px;color:var(--t2);line-height:1.55;}

/* EVENT */
.event-card{border-radius:18px;border:1px solid rgba(255,176,32,.3);background:linear-gradient(160deg,rgba(255,176,32,.07),var(--bg1));padding:22px;}
.event-title{font-size:22px;font-weight:700;margin:8px 0 10px;}
.event-desc{font-size:14px;color:var(--t1);line-height:1.65;max-width:640px;}
.event-context{margin-top:12px;padding:12px 14px;background:rgba(0,0,0,.15);border-radius:10px;border-left:3px solid var(--amber);font-size:13px;color:var(--t2);line-height:1.6;}
.event-options{display:flex;flex-direction:column;gap:9px;margin-top:18px;}
.event-opt{text-align:left;border:1px solid var(--line-s);background:var(--bg3);color:var(--t0);border-radius:12px;padding:13px 16px;cursor:pointer;font-size:13.5px;line-height:1.5;transition:all .18s;}
.event-opt:hover{border-color:var(--blue-s);background:rgba(26,86,255,.07);transform:translateX(2px);}
.event-opt.opt-best{border-color:rgba(47,206,122,.4);background:rgba(47,206,122,.06);}
.event-opt.opt-good{border-color:rgba(0,194,168,.4);background:rgba(0,194,168,.06);}
.event-opt.opt-risky{border-color:rgba(255,176,32,.4);background:rgba(255,176,32,.06);}
.event-opt.opt-bad{border-color:rgba(255,61,90,.4);background:rgba(255,61,90,.06);}
.consequence-box{margin-top:18px;border-radius:14px;padding:16px 18px;border:1px solid var(--line-s);background:var(--bg2);}
.consequence-box.good-c{border-color:rgba(47,206,122,.35);background:rgba(47,206,122,.06);}
.consequence-box.bad-c{border-color:rgba(255,61,90,.35);background:rgba(255,61,90,.06);}
.consequence-box.risk-c{border-color:rgba(255,176,32,.35);background:rgba(255,176,32,.06);}
.cons-label{font-size:10px;text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:8px;}
.good-c .cons-label{color:var(--green);}
.bad-c .cons-label{color:var(--red);}
.risk-c .cons-label{color:var(--amber);}
.cons-text{font-size:14px;color:var(--t1);line-height:1.65;}
.lesson-box{margin-top:12px;padding:12px 14px;background:rgba(155,107,255,.08);border:1px solid rgba(155,107,255,.25);border-radius:10px;font-size:13px;color:#c4b0f5;line-height:1.6;}
.lesson-box b{color:var(--purple);}

/* REPORT */
.score-ring{width:180px;height:180px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;position:relative;background:conic-gradient(var(--teal) calc(var(--pct)*1%),var(--bg3) 0);}
.score-ring::before{content:'';position:absolute;inset:10px;border-radius:50%;background:var(--bg0);}
.score-num{position:relative;z-index:1;font-family:'Space Grotesk',sans-serif;font-size:40px;font-weight:700;text-align:center;}
.score-sub{position:relative;z-index:1;font-size:12px;color:var(--t2);text-align:center;}
.report-dim{margin-bottom:14px;}
.rep-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.rep-name{font-size:12.5px;color:var(--t1);font-weight:600;}
.rep-val{font-family:'JetBrains Mono',monospace;font-size:12px;}
.insight-card{border-radius:14px;padding:16px 18px;border:1px solid var(--line-s);background:var(--bg2);}
.insight-card h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.insight-card.strength h4{color:var(--green);}
.insight-card.weakness h4{color:var(--red);}
.insight-card p{font-size:13.5px;color:var(--t0);line-height:1.65;}
.lesson-list{display:flex;flex-direction:column;gap:10px;}
.lesson-item{display:flex;gap:9px;align-items:flex-start;font-size:13.5px;color:var(--t1);line-height:1.55;}
.lesson-dot{flex-shrink:0;width:7px;height:7px;border-radius:50%;background:var(--teal);margin-top:6px;}

/* RANDOM BRAND CARD */
.rand-card{border-radius:18px;border:1px solid rgba(155,107,255,.3);background:linear-gradient(160deg,rgba(155,107,255,.08),var(--bg1));padding:22px;}
.rand-card .client-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--purple);font-weight:700;margin-bottom:10px;}
.rand-name{font-size:26px;font-weight:700;margin-bottom:4px;}
.rand-meta{font-size:13.5px;color:var(--t1);}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px;}
@media(max-width:600px){.detail-grid{grid-template-columns:1fr;}}
.detail-item{background:rgba(0,0,0,.15);border-radius:10px;padding:12px 14px;}
.detail-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:5px;font-weight:600;}
.detail-val{font-size:13.5px;color:var(--t0);line-height:1.5;}

/* AUDIENCE PROFILE */
.aud-profile{background:linear-gradient(160deg,rgba(26,86,255,.07),var(--bg1));border:1px solid rgba(26,86,255,.25);border-radius:16px;padding:20px;}
.aud-insight{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
.aud-insight:last-child{margin-bottom:0;}
.aud-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;}
.aud-insight-txt{font-size:13.5px;color:var(--t0);line-height:1.6;}
.aud-insight-txt b{color:var(--blue-s);}

/* WELCOME */
.welcome-wrap{min-height:calc(100vh - 56px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.welcome-tag{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--teal-s);margin-bottom:16px;font-weight:600;}
.welcome-title{font-size:clamp(28px,5.5vw,52px);font-weight:700;line-height:1.06;max-width:760px;background:linear-gradient(135deg,#fff 30%,var(--blue-s) 65%,var(--teal-s) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
.welcome-sub{margin-top:16px;font-size:16px;color:var(--t1);max-width:580px;line-height:1.65;}

.fade-in{animation:fadeIn .4s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

@media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important;}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef } = React;

/* ================================================================
   DATA POOLS

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function clamp(v,mn=0,mx=100){ return Math.max(mn,Math.min(mx,Math.round(v))); }
function getPlatformFit(platform, mode, brandType){
  if(mode==='personal') return platform.personal;
  if(brandType==='b2b') return platform.b2b;
  return platform.b2c;
}
function fitLabel(score){ return score>=75?'High Fit':score>=50?'Medium Fit':'Low Fit'; }
function fitClass(score){ return score>=75?'fit-high':score>=50?'fit-med':'fit-low'; }

    { week:1, cls:'w1', theme: isP?'Foundation & Voice Definition':'Brand Foundation & Positioning',

    },
    { week:2, cls:'w2', theme: isP?'Content Pillars & Community Seeding':'Pillar Content & Audience Discovery',
      focus: isP?'Publish across all three pillars and start genuine community engagement':'Create foundational content for each pillar and identify your ideal customers',
      goals: isP?[
        `Publish one strong ${pNames[0]||'thought leadership'} piece on your primary platform`,
        `Write and share a ${pNames[1]||'personal story'} post — your most vulnerable and authentic story so far`,
        `Comment with genuine, substantive insights on 10 posts from people in your niche daily`,
        `Draft your first newsletter issue — even a short, personal one signals serious intent`,
        `Start tracking: which content types get the most saves and shares (not just likes)`
      ]:[

    { week:3, cls:'w3', theme: isP?'Content Momentum & Reach Expansion':'Reach, Growth & Community Building',

        `Repurpose your best performing post from week 2 into a different format`,

        `Begin a collaboration or co-creation with a complementary (non-competing) brand`,
        `Repurpose top performing content from weeks 1–2 into a new format on a second platform`,
        `Review cost-per-result of any paid promotion and adjust targeting if needed`
      ],
      note: isP?`Week 3 is about distribution. Great content without distribution is a tree falling in an empty forest. Reach is a skill.`:`Week 3 is about reach. Creation is table stakes — distribution strategy is what separates growing brands from stagnant ones.`
    },
    { week:4, cls:'w4', theme: isP?'Community Building & Strategy Review':'Conversion, Retention & Month-2 Planning',
      focus: isP?`Deepen community relationships and make decisions about the next 90 days based on real data`:`Analyze full month performance and build your month 2 strategy with real data`,
      goals: isP?[

        `Publish a '30-day reflection' post — what you learned, what surprised you, what you'd do differently`,

        `Make one clear decision: which one platform will get 80% of your energy in month 2?`
      ]:[

        `Build a 30-day editorial calendar for month 2 weighted toward what worked`,
        `Launch a loyalty or engagement initiative for your existing customers`,

        `Make one clear decision about which platform to invest more heavily in and which to deprioritize`
      ],
      note: isP?`Week 4 is about learning, not just doing. The personal brands that grow fastest iterate quickly based on real signals, not assumptions.`:`Week 4 is about compounding. The brands that grow fastest are the ones that double down on what's working instead of spreading effort evenly.`

  ];
}

function computeScores(mode, platforms, pillars, eventQuality, brandData){
  const type = mode==='personal'?'personal':(brandData?.type||'b2c');
  const avgFit = platforms.length ? Math.round(platforms.reduce((s,p)=>s+getPlatformFit(p,mode,type),0)/platforms.length) : 50;
  const pillarDiversity = pillars.length>=3 ? 80 : 55;
  const eventScoreMap = { best:100, good:78, okay:58, risky:50, bad:28 };
  const eventScore = eventScoreMap[eventQuality]||55;
  const platformScore = clamp(avgFit + (platforms.length>=2?10:0) + (platforms.length>=3?5:0));
  const contentScore = clamp(pillarDiversity + (pillars.length*3));
  const audienceScore = clamp(70 + (mode==='own'||mode==='personal'?15:8));
  const growthPotential = clamp((platformScore+contentScore+eventScore)/3);
  const overall = clamp((audienceScore*0.2+platformScore*0.25+contentScore*0.25+eventScore*0.2+growthPotential*0.1));
  return { audience:audienceScore, platform:platformScore, content:contentScore, event:eventScore, growth:growthPotential, overall };
}

  ]:[
    {n:'1',text:<span>Your customer is: <b>{brandData.audience}</b>. Good audience definition. Now go deeper: what does this person fear? What do they want? What would make them feel understood?</span>},

`Act as an expert personal brand strategist.

Create 4 detailed psychographic profiles of my ideal audience member.

:
`Act as an expert marketing strategist and customer research analyst.

Brand: ${brandData.name}

Create 3 deep customer personas. For each persona include:

function PlatformSection({brandData, mode, onNext}){

  function toggle(p){
    setSelected(prev=>{

Audience: ${brandData.audience}
I've chosen these platforms: ${selected.map(p=>p.name).join(', ')||'[platforms to be selected]'}

1. How to adapt one core content idea for each chosen platform without just copying it

   MARKETING EVENT
   ================================================================ */
function EventSection({brandData, mode, onNext}){
  const [event]=useState(rand(mode==='personal'?PERSONAL_EVENTS:BUSINESS_EVENTS));
  const [chosen,setChosen]=useState(null);
  const [revealed,setRevealed]=useState(false);

  function choose(opt){
    if(revealed) return;
    setChosen(opt);
  }
  function reveal(){
    if(!chosen) return;
    setRevealed(true);
  }
  function consClass(q){ return q==='best'||q==='good'?'good-c':q==='risky'||q==='okay'?'risk-c':'bad-c'; }

  const promptStr=`Act as a crisis communications and marketing strategy consultant.

Brand: ${brandData.name}
Situation: ${event.title}
How we responded: ${chosen?.label||'[response to be selected]'}

1. Evaluate the quality of this response from a marketing and brand reputation perspective
2. What are the top 3 risks of this approach that we should monitor over the next 30 days?
3. Write a specific response statement we could use publicly in this situation
4. What proactive steps should we take in the next 24 hours?
5. How do brands typically recover from this type of situation, and what's the timeline?`;

  return(
    <div className="fade-in">
      <div className="sec-head"><h2>Unexpected Event Alert</h2><p>Real marketing never goes exactly to plan. Something just happened that requires an immediate strategic response. How you respond in the next few hours will define how your audience sees you.</p></div>
      <ConceptBox eyebrow="Why unexpected events matter in marketing">
        Marketing strategy is what you plan. <b>Marketing judgment is what you do when the plan breaks.</b> Some of the most iconic brand moments in history happened when companies responded with creativity, authenticity, and speed to things they didn't plan. Equally, some of the worst brand disasters happened when companies responded defensively, slowly, or dishonestly to things they didn't plan. <b>How you respond to the unexpected reveals your brand's true character.</b>
      </ConceptBox>
      <div className="event-card" style={{marginBottom:18}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:6}}>
          <span style={{fontSize:24}}>{event.emoji}</span>
          <span className={'pill '+(event.type==='opportunity'?'teal':'red')}>{event.urgency}</span>
          <span className="pill">{event.type==='opportunity'?'Opportunity':'Crisis'}</span>
        </div>
        <div className="event-title">{event.title}</div>
        <p className="event-desc">{event.desc}</p>
        <div className="event-context">🧠 Strategist context: {event.context}</div>
        {!revealed&&(
          <>
            <div style={{marginTop:18,marginBottom:10,fontSize:13,fontWeight:600,color:'var(--t0)'}}>How do you respond?</div>
            <div className="event-options">
              {event.options.map((opt,i)=>(
                <button key={i} className={"event-opt"+(chosen===opt?' selected':'')} style={chosen===opt?{borderColor:'var(--teal)',background:'rgba(0,194,168,.1)'}:{}} onClick={()=>choose(opt)}>
                  {opt.label}
                </button>
              ))}
            </div>
            {chosen&&(
              <div className="footer-btns" style={{marginTop:16}}>
                <button className="btn btn-teal" onClick={reveal}>Reveal the Consequences →</button>
              </div>
            )}
          </>
        )}
        {revealed&&chosen&&(
          <div className="fade-in" style={{marginTop:18}}>
            <div className={"consequence-box "+(consClass(chosen.quality))}>
              <div className="cons-label">
                {chosen.quality==='best'?'✅ Excellent Strategic Response':chosen.quality==='good'?'✓ Good Response':chosen.quality==='okay'?'⚠️ Acceptable but Suboptimal':chosen.quality==='risky'?'⚡ High-Risk Response':'❌ Poor Strategic Choice'}
              </div>
              <p className="cons-text"><b>Your choice:</b> {chosen.label}</p>
              <p className="cons-text" style={{marginTop:8}}>{chosen.consequence}</p>
            </div>
            <div className="lesson-box" style={{marginTop:12}}>
              <b>Marketing lesson:</b> {chosen.lesson}
            </div>
          </div>
        )}
      </div>
      {revealed&&chosen&&(
        <>
          <ClaudeCard
            title="Get expert guidance on crisis or opportunity response"
            prompt={promptStr}
            tip="When asking Claude to evaluate a real situation, include 'what are the risks' and 'what should I do in the next 24 hours' — it forces actionable, time-bound advice rather than general principles."
          />
          <div className="footer-btns"><button className="btn btn-primary" onClick={()=>onNext(chosen.quality)}>See My Growth Report →</button></div>
        </>
      )}
    </div>
  );
}

   ================================================================ */
function GrowthReport({brandData, mode, platforms, pillars, eventQuality, onReplay}){
  const scores=computeScores(mode,platforms,pillars,eventQuality,brandData);
  const isP=mode==='personal';
  const grade=scores.overall>=88?'A+':scores.overall>=76?'A':scores.overall>=64?'B':scores.overall>=52?'C':'D';
  const gradeLabel=scores.overall>=88?'World-Class Strategist':scores.overall>=76?'Strong Marketing Thinker':scores.overall>=64?'Solid Foundation':scores.overall>=52?'Developing Strategist':'Strategy Needs Work';

  const dims=[
    {label:'Audience Understanding',val:scores.audience,bar:'bar-blue'},
    {label:'Platform Strategy',val:scores.platform,bar:'bar-teal'},
    {label:'Content Strategy',val:scores.content,bar:'bar-purple'},
    {label:'Crisis / Opportunity Response',val:scores.event,bar:scores.event>=70?'bar-green':scores.event>=50?'bar-amber':'bar-red'},
    {label:'Growth Potential',val:scores.growth,bar:'bar-teal'},
  ];

  const strengths=dims.filter(d=>d.val>=70).slice(0,2);
  const weaknesses=dims.filter(d=>d.val<55).slice(0,2);

  const lessons=isP?[
    `Authenticity is not a strategy — it's a baseline. <b>Consistency of your authentic voice is the strategy.</b> Personal brands that post once a week for a year beat accounts that post daily for a month every time.`,
    `<b>Niche clarity compounds.</b> The narrower your focus feels in month 1, the wider your reach becomes in month 12. Being specific about who you serve makes your content feel personal to everyone in that group.`,
    scores.event>=70?`Your response to the unexpected event showed <b>strong strategic judgment</b> — the hallmark of a personal brand people want to follow and trust with serious questions.`:`The most important personal branding skill isn't content creation — it's <b>responding well under pressure.</b> How you act when things go sideways defines your character more than any planned post.`
  ]:[
    `<b>Strategy before content, always.</b> The question "what should we post?" is the last question in the marketing process, not the first. Audience, positioning, platform, and pillar decisions all come before the first piece of content.`,
    `<b>Consistency beats perfection at every stage of brand building.</b> A brand that posts reliably across 2 platforms with clear message alignment will outgrow one that produces occasional brilliant content with no consistent presence.`,
    scores.event>=70?`Your strategic response to an unexpected event showed <b>sound marketing judgment</b> — the ability to remain calm, think clearly about brand values, and choose the long-term response over the short-term one.`:`Marketing strategy isn't just what you do when everything goes right. <b>The brands with the strongest reputations are the ones that handle disruption with grace, speed, and honesty</b> — that's what builds permanent trust.`
  ];

  return(
    <div className="fade-in">
      <div className="sec-head"><h2>Your Marketing Strategy Growth Report</h2><p>Here's the full assessment of the marketing strategy you built for <b>{brandData.name}</b>.</p></div>
      <div className="card" style={{textAlign:'center',padding:'32px 20px 24px',marginBottom:18}}>
        <div className="score-ring" style={{'--pct':scores.overall}}>
          <div style={{position:'relative',zIndex:1,textAlign:'center'}}>
            <div className="score-num">{scores.overall}</div>
            <div className="score-sub">/ 100</div>
          </div>
        </div>
        <div style={{fontSize:28,fontWeight:700,fontFamily:"'Space Grotesk',sans-serif",background:'linear-gradient(135deg,var(--teal-s),var(--blue-s))',WebkitBackgroundClip:'text',backgroundClip:'text',color:'transparent',marginBottom:4}}>{grade}</div>
        <div style={{fontSize:15,fontWeight:600,color:'var(--t0)',marginBottom:8}}>{gradeLabel}</div>
        <p style={{fontSize:13.5,color:'var(--t1)',maxWidth:480,margin:'0 auto',lineHeight:1.6}}>Overall strategy quality score across audience understanding, platform fit, content architecture, and crisis judgment.</p>
      </div>
      <div className="g2" style={{marginBottom:18}}>
        <div className="card">
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--t2)',fontWeight:600,marginBottom:14}}>Strategy Scorecard</div>
          {dims.map((d,i)=><BarRow key={i} label={d.label} value={d.val} barClass={d.bar} suffix="/100"/>)}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <div className="insight-card strength">
            <h4>Strategic Strengths</h4>
            {strengths.length>0?strengths.map((s,i)=><p key={i} style={{marginBottom:i<strengths.length-1?8:0}}><b>{s.label}:</b> Scoring {s.val}/100 — strong decision-making in this area. Build on this in month 2.</p>):<p>Your strategy shows consistent competence across all dimensions — no single breakout strength yet. Focus on picking one area to master first.</p>}
          </div>
          <div className="insight-card weakness">
            <h4>Areas to Strengthen</h4>
            {weaknesses.length>0?weaknesses.map((w,i)=><p key={i} style={{marginBottom:i<weaknesses.length-1?8:0}}><b>{w.label}:</b> Scoring {w.val}/100 — this is where sharpening your thinking will produce the biggest ROI on your next strategy iteration.</p>):<p>No major weak points identified. Your strategy is well-balanced. Depth and consistency over time are now your primary growth levers.</p>}
          </div>
        </div>
      </div>
      <div className="g2" style={{marginBottom:18}}>
        <div className="card card-sm">
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--green)',fontWeight:600,marginBottom:10}}>Best Decision</div>
          <p style={{fontSize:14,color:'var(--t0)',lineHeight:1.65}}>{scores.platform>=70?`Choosing platforms with strong audience fit — especially ${platforms[0]?.name||'your primary platform'}. Platform misalignment is one of the most expensive mistakes in marketing.`:scores.content>=70?`Building a clear three-pillar content architecture using ${pillars[0]?.name||'your core pillar'} as the foundation. Structure before volume is the right instinct.`:scores.event>=70?'Responding to the unexpected event with strategic clarity rather than reactivity. That kind of judgment is what separates strong brand leaders from the rest.':'Getting your audience definition specific enough to base real strategic decisions on. Most brands never do this work this thoroughly.'}</p>
        </div>
        <div className="card card-sm">
          <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--red)',fontWeight:600,marginBottom:10}}>Biggest Opportunity to Improve</div>
          <p style={{fontSize:14,color:'var(--t0)',lineHeight:1.65}}>{scores.event<55?'Your response to the unexpected event is the area to reflect on most. Real marketing judgment is tested by disruption — reviewing how brands have handled similar situations is the best way to develop this skill.':scores.platform<55?`Platform selection — the fit between your chosen platforms and your audience type could be stronger. Platform mismatch leads to beautiful content reaching the wrong people.`:`Turning your 30-day roadmap from a strategic plan into a disciplined daily execution habit. Strategy is only as good as its consistent implementation.`}</p>
        </div>
      </div>
      <div className="card" style={{marginBottom:18}}>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--purple)',fontWeight:600,marginBottom:14}}>Three Marketing Lessons From This Strategy Session</div>
        <div className="lesson-list">
          {lessons.map((l,i)=>(
            <div key={i} className="lesson-item">
              <div className="lesson-dot"/>
              <div dangerouslySetInnerHTML={{__html:l}}/>
            </div>
          ))}
        </div>
      </div>
      <div className="card card-sm" style={{marginBottom:18}}>
        <div style={{fontSize:11,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--t2)',fontWeight:600,marginBottom:12}}>Your Strategy Summary</div>
        <div className="g2">
          <div><div style={{fontSize:11,color:'var(--t2)',marginBottom:4}}>Brand</div><div style={{fontWeight:700}}>{brandData.name}</div></div>
          <div><div style={{fontSize:11,color:'var(--t2)',marginBottom:4}}>Platforms</div><div style={{fontWeight:700}}>{platforms.map(p=>p.name).join(', ')}</div></div>
          <div><div style={{fontSize:11,color:'var(--t2)',marginBottom:4}}>Content Pillars</div><div style={{fontWeight:700}}>{pillars.map(p=>p.emoji+' '+p.name).join(', ')}</div></div>
          <div><div style={{fontSize:11,color:'var(--t2)',marginBottom:4}}>Mode</div><div style={{fontWeight:700}}>{mode==='personal'?'Personal Brand':mode==='own'?'Your Business':'Client Strategy'}</div></div>
        </div>
      </div>
      <ClaudeCard
        title="Get a full marketing strategy document for this brand"
        prompt={`Act as a senior marketing strategist. Write a complete one-page marketing strategy document for ${brandData.name}.

Brand overview: ${brandData.product}
Target audience: ${brandData.audience}
Chosen platforms: ${platforms.map(p=>p.name).join(', ')}
Content pillars: ${pillars.map(p=>p.name).join(', ')}
Biggest challenge: ${brandData.challenge}

The strategy document should include:
1. Positioning statement (one paragraph)
2. Audience insight summary (what drives them, what holds them back)
3. Platform strategy rationale
4. Content pillar breakdown with one example for each
5. 90-day north star metric and how to measure it
6. The single most important thing this brand must do consistently to grow

Write it in plain, direct language that a non-marketer can understand and use.`}
        tip="Ending with 'write it so a non-marketer can understand' consistently produces clearer, more actionable strategy documents than generic prompts."
      />
      <div className="footer-btns" style={{marginTop:32}}>
        <button className="btn btn-primary" onClick={onReplay}>▶ Build Another Strategy</button>
      </div>
    </div>
  );
}

/* ================================================================
   TOP BAR
   ================================================================ */
const STEP_LABELS=['Welcome','Brand Setup','Audience','Platforms','Pillars','Roadmap','Event','Report'];
function TopBar({step}){
  return(
    <div className="topbar">
      <div className="tb-brand">
        <div className="tb-mark">M</div>
        <div className="tb-name">Think Like a Strategist <span>· Grow This Brand</span></div>
      </div>
      <div style={{display:'flex',alignItems:'center'}}>
        {step>0&&<span className="tb-step">Step {step} of {STEP_LABELS.length-1}</span>}
        <div className="tb-progress">
          {STEP_LABELS.map((_,i)=>(
            <div key={i} className={"tb-dot"+(i<step?' done':i===step?' active':'')} title={STEP_LABELS[i]}/>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ================================================================
   APP
   ================================================================ */
function App(){
  const [step,setStep]=useState(0);
  const [mode,setMode]=useState(null);
  const [brandData,setBrandData]=useState(null);
  const [platforms,setPlatforms]=useState([]);
  const [pillars,setPillars]=useState([]);
  const [eventQuality,setEventQuality]=useState(null);
  const topRef=useRef(null);

  function scrollTop(){ window.scrollTo({top:0,behavior:'smooth'}); }

  function handleStart(m){ setMode(m); setStep(1); scrollTop(); }
  function handleBrand(b){ setBrandData(b); setStep(2); scrollTop(); }
  function handleAudience(){ setStep(3); scrollTop(); }
  function handlePlatforms(p){ setPlatforms(p); setStep(4); scrollTop(); }
  function handlePillars(p){ setPillars(p); setStep(5); scrollTop(); }
  function handleRoadmap(){ setStep(6); scrollTop(); }
  function handleEvent(q){ setEventQuality(q); setStep(7); scrollTop(); }
  function handleReplay(){ setStep(0);setMode(null);setBrandData(null);setPlatforms([]);setPillars([]);setEventQuality(null); scrollTop(); }

  return(
    <div ref={topRef}>
      <TopBar step={step}/>
      <div className="shell">
        {step===0&&<Welcome onStart={handleStart}/>}
        {step===1&&<BrandSetup mode={mode} onComplete={handleBrand}/>}
        {step===2&&<AudienceSection brandData={brandData} mode={mode} onNext={handleAudience}/>}
        {step===3&&<PlatformSection brandData={brandData} mode={mode} onNext={handlePlatforms}/>}
        {step===4&&<PillarsSection brandData={brandData} mode={mode} platforms={platforms} onNext={handlePillars}/>}
        {step===5&&<RoadmapSection brandData={brandData} mode={mode} platforms={platforms} pillars={pillars} onNext={handleRoadmap}/>}
        {step===6&&<EventSection brandData={brandData} mode={mode} onNext={handleEvent}/>}
        {step===7&&<GrowthReport brandData={brandData} mode={mode} platforms={platforms} pillars={pillars} eventQuality={eventQuality} onReplay={handleReplay}/>}
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</body>
</html>
