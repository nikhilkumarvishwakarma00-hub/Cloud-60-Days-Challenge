<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🧩 Prompt Puzzle — Master AI Prompting Through Play</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --bg:#0a0e1a; --bg2:#0f1526; --card:#131a2e; --card2:#1a2340;
  --blue:#1a56ff; --teal:#00c2a8; --purple:#7c5cff; --gold:#ffb020;
  --red:#ff4d6d; --green:#22e0a0; --text:#e8ecf7; --muted:#8a93b8;
  --border:rgba(255,255,255,0.08);
  --grad: linear-gradient(135deg, var(--blue), var(--teal));
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background: radial-gradient(circle at 20% 0%, #131b33 0%, var(--bg) 60%);
  color:var(--text); min-height:100vh; overflow-x:hidden;
}
h1,h2,h3,.mono{font-family:'Space Grotesk',system-ui,sans-serif;}
.mono-data{font-family:'JetBrains Mono',monospace;}
#app{max-width:1100px; margin:0 auto; padding:24px 20px 80px;}
.header{text-align:center; margin-bottom:28px;}
.header h1{font-size:28px; font-weight:700; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; letter-spacing:0.5px;}
.header p{color:var(--muted); margin-top:6px; font-size:14px;}

.panel{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; margin-bottom:20px; box-shadow:0 8px 30px rgba(0,0,0,0.3);}

/* Setup screen */
.setup-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin:16px 0;}
.choice-btn{background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:16px 10px; text-align:center; cursor:pointer; transition:all .25s; color:var(--text); font-weight:600; font-size:14px;}
.choice-btn:hover{border-color:var(--teal); transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,194,168,0.2);}
.choice-btn.active{background:var(--grad); border-color:transparent; color:#fff;}
.btn{background:var(--grad); border:none; color:#fff; padding:12px 26px; border-radius:10px; font-weight:700; cursor:pointer; font-size:14px; transition:transform .2s, box-shadow .2s;}
.btn:hover{transform:translateY(-2px); box-shadow:0 8px 24px rgba(26,86,255,0.4);}
.btn:disabled{opacity:0.4; cursor:not-allowed; transform:none;}
.btn.secondary{background:var(--card2); border:1px solid var(--border);}
.btn.small{padding:8px 16px; font-size:12px;}

/* HUD */
.hud{display:flex; gap:12px; flex-wrap:wrap; justify-content:space-between; align-items:center; margin-bottom:16px;}
.hud-stats{display:flex; gap:10px; flex-wrap:wrap;}
.stat-chip{background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:8px 14px; font-size:12px; color:var(--muted);}
.stat-chip b{color:var(--text); font-family:'JetBrains Mono',monospace;}
.progress-bar{height:6px; background:var(--card2); border-radius:6px; overflow:hidden; margin-bottom:20px;}
.progress-fill{height:100%; background:var(--grad); transition:width .4s ease;}

/* Scenario */
.scenario-title{font-size:13px; text-transform:uppercase; letter-spacing:1px; color:var(--teal); margin-bottom:6px;}
.scenario-desc{font-size:16px; margin-bottom:14px; line-height:1.5;}
.desired-output{background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--gold); border-radius:8px; padding:12px 16px; font-size:13px; color:var(--muted); margin-bottom:18px;}
.desired-output b{color:var(--gold);}

.block-area{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
@media(max-width:700px){.block-area{grid-template-columns:1fr;}}
.zone{background:var(--bg2); border:1px dashed var(--border); border-radius:12px; padding:14px; min-height:160px;}
.zone h4{font-size:12px; text-transform:uppercase; color:var(--muted); margin-bottom:10px; letter-spacing:0.5px;}
.zone.dragover{border-color:var(--teal); background:rgba(0,194,168,0.06);}

.block{
  background:var(--card2); border:1px solid var(--border); border-radius:8px;
  padding:10px 12px; margin-bottom:8px; cursor:grab; font-size:13px; line-height:1.4;
  transition:transform .15s, box-shadow .15s, border-color .15s;
}
.block:hover{border-color:var(--blue); transform:translateX(2px);}
.block.dragging{opacity:0.4;}
.block.correct-flash{border-color:var(--green); box-shadow:0 0 0 2px rgba(34,224,160,0.3);}
.block.wrong-flash{border-color:var(--red); box-shadow:0 0 0 2px rgba(255,77,109,0.3); animation:shake .3s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
.block .tag{display:inline-block; font-size:9px; text-transform:uppercase; background:rgba(255,255,255,0.06); padding:2px 6px; border-radius:4px; margin-right:6px; color:var(--muted);}

.slot-list{list-style:none;}

/* Choose best prompt */
.choice-card{background:var(--card2); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; cursor:pointer; transition:all .2s;}
.choice-card:hover{border-color:var(--teal); transform:translateY(-2px);}
.choice-card.selected{border-color:var(--blue); background:rgba(26,86,255,0.08);}
.choice-card .label{font-size:11px; text-transform:uppercase; color:var(--muted); margin-bottom:4px;}
.choice-card pre{white-space:pre-wrap; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text); line-height:1.5;}

/* Clean prompt */
.dirty-prompt{background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:14px; font-family:'JetBrains Mono',monospace; font-size:13px; line-height:2; margin-bottom:14px;}
.dirty-prompt .chunk{display:inline-block; padding:3px 8px; border-radius:6px; margin:2px; cursor:pointer; border:1px solid transparent; transition:all .15s;}
.dirty-prompt .chunk.flaw{background:rgba(255,77,109,0.12); border-color:rgba(255,77,109,0.3);}
.dirty-prompt .chunk.flaw:hover{background:rgba(255,77,109,0.25);}
.dirty-prompt .chunk.removed{opacity:0.25; text-decoration:line-through; cursor:default;}
.dirty-prompt .chunk.good{opacity:0.9;}

.action-row{display:flex; gap:10px; justify-content:flex-end; margin-top:16px; flex-wrap:wrap;}

/* Notifications */
#notif-wrap{position:fixed; top:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:10px;}
.notif{background:var(--card2); border:1px solid var(--border); border-left:4px solid var(--teal); border-radius:10px; padding:12px 18px; font-size:13px; min-width:220px; box-shadow:0 10px 30px rgba(0,0,0,0.4); animation:slideIn .3s ease, fadeOut .4s ease 2.6s forwards;}
.notif.bad{border-left-color:var(--red);}
.notif.good{border-left-color:var(--green);}
@keyframes slideIn{from{transform:translateX(40px); opacity:0;} to{transform:translateX(0); opacity:1;}}
@keyframes fadeOut{to{opacity:0; transform:translateX(20px);}}

.score-pop{position:fixed; pointer-events:none; font-weight:800; font-family:'Space Grotesk',sans-serif; font-size:20px; color:var(--green); z-index:1000; animation:popUp 1s ease forwards;}
@keyframes popUp{0%{opacity:0; transform:translateY(0) scale(0.8);}20%{opacity:1; transform:translateY(-10px) scale(1.1);}100%{opacity:0; transform:translateY(-60px) scale(1);}}

/* Report */
.report-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
@media(max-width:700px){.report-grid{grid-template-columns:1fr;}}
.big-score{font-size:52px; font-weight:800; font-family:'Space Grotesk',sans-serif; background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent;}
.rank-badge{display:inline-block; padding:6px 16px; border-radius:20px; background:var(--grad); font-weight:700; font-size:13px; margin-top:6px;}
.dna-bars{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
.dna-row{display:flex; align-items:center; gap:10px; font-size:12px;}
.dna-row .label{width:110px; color:var(--muted); flex-shrink:0;}
.dna-track{flex:1; height:8px; background:var(--bg2); border-radius:6px; overflow:hidden;}
.dna-fill{height:100%; border-radius:6px; transition:width 1s ease;}
.feedback-box{background:var(--bg2); border-radius:10px; padding:14px; font-size:13px; line-height:1.6; margin-top:14px; color:var(--muted);}
.final-prompt-box{background:var(--bg2); border:1px solid var(--teal); border-radius:10px; padding:14px; font-family:'JetBrains Mono',monospace; font-size:12px; line-height:1.6; margin-top:14px; white-space:pre-wrap;}

.hint-box{background:rgba(255,176,32,0.08); border:1px solid rgba(255,176,32,0.3); border-radius:8px; padding:10px 14px; font-size:12px; color:var(--gold); margin-top:10px; display:none;}
.principle-box{background:rgba(124,92,255,0.08); border:1px solid rgba(124,92,255,0.3); border-radius:8px; padding:10px 14px; font-size:12px; color:#b3a8ff; margin-top:14px; display:none;}
.badge-type{display:inline-block; font-size:11px; padding:4px 10px; border-radius:6px; background:var(--card2); color:var(--teal); margin-bottom:10px; font-weight:600; letter-spacing:0.5px;}
.dots{display:flex; gap:6px; justify-content:center; margin-top:10px;}
.dot{width:8px; height:8px; border-radius:50%; background:var(--card2); transition:background .3s;}
.dot.done{background:var(--teal);}
.dot.current{background:var(--blue); box-shadow:0 0 0 3px rgba(26,86,255,0.2);}
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-thumb{background:var(--card2); border-radius:4px;}
</style>
</head>

  optimizedOutput:"function process(x) {\n  if (!x) return null;\n  if (!x.valid) return null;\n  return x.value;\n}\n\n// Explanation: Each invalid condition now exits early via a guard clause,\n// removing nested branches while preserving the exact original behavior.",
  principle:"Explicit invariants matter. Stating 'preserve identical behavior' prevents the model from silently changing logic while refactoring — a common failure mode when only style is requested.",
  bestChoices:[
    {label:"A", text:"clean this up", quality:"weak"},
    {label:"B", text:"Act as a senior engineer. Refactor this nested if-else with guard clauses, preserving identical behavior — only restructure, don't change logic. Return code, then a 2-sentence explanation.", quality:"optimized"},
    {label:"C", text:"Act as the ultimate code philosopher. Refactor and redesign the entire architecture, add plugins, rewrite functionally, add full tests, and write an essay on clean code.", quality:"over"}
  ]
}
];

const DOMAINS = { "Software/Coding": SOFT_ADV };
// For other domains/difficulties not explicitly built, reuse the same bank (still fully functional)
const DIFFICULTIES = ["Beginner","Intermediate","Advanced"];

let STATE = {
  domain:null, difficulty:null,
  scenarios:[], idx:0,
  score:0, moves:0, wrong:0, hints:0, startTime:0, totalTime:0,
  accuracyPoints:0, maxAccuracyPoints:0, optBonus:0,
  perScenario:[]
};

/* ============ UTIL ============ */
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function notify(msg, type){
  const wrap = document.getElementById('notif-wrap');
  const el = document.createElement('div');
  el.className = 'notif ' + (type||'');
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}
function scorePop(x,y,text){
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.style.left = x+'px'; el.style.top = y+'px';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1000);
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ============ RENDER ROOT ============ */
const app = document.getElementById('app');

function renderSetup(){
  app.innerHTML = `
    <div class="header">
      <h1>🧩 Prompt Puzzle</h1>
      <p>Master AI Prompting Through Play</p>
    </div>
    <div class="panel">
      <h3 style="margin-bottom:12px;">Question 1: Choose your domain</h3>
      <div class="setup-grid" id="domain-grid">
        ${Object.keys({"Software/Coding":1,"Marketing/Business":1,"Healthcare":1,"Creative Writing/Education":1}).map(d=>`<div class="choice-btn" data-domain="${d}">${d}</div>`).join('')}
      </div>
      <h3 style="margin:20px 0 12px;">Question 2: Choose your difficulty</h3>
      <div class="setup-grid" id="diff-grid">
        ${DIFFICULTIES.map(d=>`<div class="choice-btn" data-diff="${d}">${d}</div>`).join('')}
      </div>
      <div style="text-align:center; margin-top:24px;">
        <button class="btn" id="start-btn" disabled>Start Puzzle →</button>
      </div>
    </div>
  `;
  let selDomain = "Software/Coding", selDiff = "Advanced";
  document.querySelectorAll('#domain-grid .choice-btn').forEach(b=>{
    if(b.dataset.domain===selDomain) b.classList.add('active');
    b.onclick = ()=>{ document.querySelectorAll('#domain-grid .choice-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); selDomain=b.dataset.domain; };
  });
  document.querySelectorAll('#diff-grid .choice-btn').forEach(b=>{
    if(b.dataset.diff===selDiff) b.classList.add('active');
    b.onclick = ()=>{ document.querySelectorAll('#diff-grid .choice-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); selDiff=b.dataset.diff; };
  });
  document.getElementById('start-btn').disabled = false;
  document.getElementById('start-btn').onclick = ()=>{
    STATE.domain = selDomain; STATE.difficulty = selDiff;
    initGame();
  };
}

function initGame(){
  const bank = DOMAINS[STATE.domain] || SOFT_ADV;
  let count = 6;
  STATE.scenarios = shuffle(bank).slice(0,count).map((s,i)=>({...s, challengeType: ['build','clean','choose'][i % 3]}));
  STATE.scenarios = shuffle(STATE.scenarios);
  STATE.idx = 0;
  STATE.score = 0; STATE.moves = 0; STATE.wrong = 0; STATE.hints = 0;
  STATE.startTime = Date.now(); STATE.totalTime = 0;
  STATE.accuracyPoints = 0; STATE.maxAccuracyPoints = 0; STATE.optBonus = 0;
  STATE.perScenario = [];
  notify(`Domain: ${STATE.domain} · Difficulty: ${STATE.difficulty}`, 'good');
  renderScenario();
}

function renderHUD(){
  const total = STATE.scenarios.length;
  const pct = Math.round((STATE.idx/total)*100);
  return `
    <div class="hud">
      <div class="hud-stats">
        <div class="stat-chip">Scenario <b>${STATE.idx+1}/${total}</b></div>
        <div class="stat-chip">Score <b id="live-score">${STATE.score}</b></div>
        <div class="stat-chip">Moves <b>${STATE.moves}</b></div>
        <div class="stat-chip">Wrong <b>${STATE.wrong}</b></div>
        <div class="stat-chip">Hints <b>${STATE.hints}</b></div>
      </div>
      <button class="btn secondary small" id="hint-btn">💡 Hint</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
  `;
}

function typeLabel(t){
  const type = t==='build'?'🧱 Build the Prompt': t==='clean'?'🧹 Clean the Prompt':'✅ Choose the Best Prompt';
  return type;
}

/* ============ SCENARIO ROUTER ============ */
function renderScenario(){
  if(STATE.idx >= STATE.scenarios.length){ return renderReport(); }
  const sc = STATE.scenarios[STATE.idx];
  STATE.scenarioStartTime = Date.now();
  STATE.hintShown = false;
  if(sc.challengeType === 'build') renderBuild(sc);
  else if(sc.challengeType === 'clean') renderClean(sc);
  else renderChoose(sc);
}

function wireHint(sc){
  document.getElementById('hint-btn').onclick = ()=>{
    STATE.hints++;
    notify('Hint used — small score penalty applied', 'bad');
    const box = document.getElementById('hint-box');
    if(box){ box.style.display='block'; box.textContent = '💡 ' + sc.principle; }
    renderTopHUDOnly();
  };
}
function renderTopHUDOnly(){
  const hudEl = document.querySelector('.hud');
  if(hudEl){ hudEl.parentElement.querySelector('.progress-bar')?.remove(); }
  // simplest: re-render whole scenario stats bar
  const hudWrap = document.getElementById('hud-wrap');
  if(hudWrap) hudWrap.outerHTML = `<div id="hud-wrap">${renderHUD()}</div>`;
  document.getElementById('hint-btn').onclick = document.getElementById('hint-btn').onclick; // no-op keep
}

/* ============ 1. BUILD THE PROMPT ============ */
function renderBuild(sc){
  const blocks = shuffle([...sc.correct.map(b=>({...b, correct:true})), ...sc.distractors.map(b=>({...b, correct:false}))]);
  app.innerHTML = `
    <div class="header"><h1>🧩 Prompt Puzzle</h1></div>
    <div id="hud-wrap">${renderHUD()}</div>
    <div class="panel">
      <span class="badge-type">${typeLabel('build')}</span>
      <div class="scenario-title">Scenario</div>
      <div class="scenario-desc">${esc(sc.desired.split('.')[0])}.</div>
      <div class="desired-output"><b>Desired Output:</b> ${esc(sc.desired)}</div>
      <div class="block-area">
        <div class="zone" id="pool-zone"><h4>Available Blocks</h4><div id="pool"></div></div>
        <div class="zone" id="build-zone"><h4>Your Prompt (drag blocks here, in order)</h4><ol class="slot-list" id="slots"></ol></div>
      </div>
      <div class="hint-box" id="hint-box"></div>
      <div class="action-row">
        <button class="btn secondary small" id="reset-btn">↺ Reset</button>
        <button class="btn" id="submit-btn">Submit Prompt →</button>
      </div>
    </div>
  `;
  const pool = document.getElementById('pool');
  const slots = document.getElementById('slots');
  let placed = [];

  function renderPool(){
    pool.innerHTML = '';
    blocks.forEach((b, i)=>{
      if(placed.includes(i)) return;
      const div = document.createElement('div');
      div.className = 'block'; div.draggable = true; div.dataset.i = i;
      div.innerHTML = `<span class="tag">${b.correct? b.t : 'block'}</span>${esc(b.text)}`;
      div.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', i); div.classList.add('dragging'); });
      div.addEventListener('dragend', ()=> div.classList.remove('dragging'));
      pool.appendChild(div);
    });
  }
  function renderSlots(){
    slots.innerHTML = '';
    placed.forEach((i)=>{
      const b = blocks[i];
      const li = document.createElement('li');
      li.className = 'block'; li.draggable = true; li.dataset.i = i;
      li.innerHTML = `<span class="tag">${b.correct? b.t : 'block'}</span>${esc(b.text)}`;
      li.addEventListener('dragstart', e=>{ e.dataTransfer.setData('text/plain', i); li.classList.add('dragging'); });
      li.addEventListener('dragend', ()=> li.classList.remove('dragging'));
      slots.appendChild(li);
    });
  }
  [document.getElementById('pool-zone'), document.getElementById('build-zone')].forEach(zone=>{
    zone.addEventListener('dragover', e=>{ e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('dragover'));
    zone.addEventListener('drop', e=>{
      e.preventDefault(); zone.classList.remove('dragover');
      const i = parseInt(e.dataTransfer.getData('text/plain'));
      STATE.moves++;
      if(zone.id === 'build-zone'){
        if(!placed.includes(i)) placed.push(i);
      } else {
        placed = placed.filter(x=>x!==i);
      }
      renderPool(); renderSlots(); renderTopHUDOnly();
    });
  });
  renderPool(); renderSlots();
  wireHint(sc);
  document.getElementById('reset-btn').onclick = ()=>{ placed = []; renderPool(); renderSlots(); };
  document.getElementById('submit-btn').onclick = ()=>{
    const correctCount = blocks.filter(b=>b.correct).length;
    let correctPlaced = 0, wrongPlaced = 0;
    placed.forEach(i=>{ if(blocks[i].correct) correctPlaced++; else wrongPlaced++; });
    const missed = correctCount - correctPlaced;
    STATE.wrong += wrongPlaced;
    const accuracy = Math.max(0, (correctPlaced - wrongPlaced) / correctCount);
    const pts = Math.round(accuracy * 100);
    STATE.accuracyPoints += pts; STATE.maxAccuracyPoints += 100;
    STATE.score += pts;
    scorePop(window.innerWidth/2, 100, `+${pts}`);
    if(wrongPlaced===0 && missed===0){ notify('Perfect block selection! 🎯','good'); STATE.optBonus += 10; STATE.score += 10; }
    else notify(`Placed ${correctPlaced}/${correctCount} correct blocks, ${wrongPlaced} distractors included`, wrongPlaced?'bad':'good');
    STATE.perScenario.push({id:sc.id, type:'build', accuracy});
    finishScenario();
  };
}

/* ============ 2. CLEAN THE PROMPT ============ */
function renderClean(sc){
  // Build a "dirty" prompt combining the weak prompt + distractor phrases as removable chunks, plus good chunks from correct blocks
  const goodChunks = sc.correct.map(b=>({text:b.text, flaw:false}));
  const flawChunks = sc.distractors.map(b=>({text:b.text, flaw:true}));
  let chunks = shuffle([...goodChunks, ...flawChunks]).map((c,i)=>({...c, id:i, removed:false}));

  app.innerHTML = `
    <div class="header"><h1>🧩 Prompt Puzzle</h1></div>
    <div id="hud-wrap">${renderHUD()}</div>
    <div class="panel">
      <span class="badge-type">${typeLabel('clean')}</span>
      <div class="scenario-title">Scenario</div>
      <div class="desired-output"><b>Desired Output:</b> ${esc(sc.desired)}</div>
      <p style="color:var(--muted); font-size:13px; margin-bottom:10px;">Click the flawed/unnecessary chunks below to remove them. Keep only what strengthens the prompt.</p>
      <div class="dirty-prompt" id="dirty-prompt"></div>
      <div class="hint-box" id="hint-box"></div>
      <div class="action-row">
        <button class="btn secondary small" id="reset-btn">↺ Reset</button>
        <button class="btn" id="submit-btn">Submit Cleaned Prompt →</button>
      </div>
    </div>
  `;
  const container = document.getElementById('dirty-prompt');
  function render(){
    container.innerHTML = '';
    chunks.forEach(c=>{
      const span = document.createElement('span');
      span.className = 'chunk ' + (c.removed? 'removed' : (c.flaw? 'flaw':'good'));
      span.textContent = c.text + '. ';
      if(!c.removed){
        span.onclick = ()=>{
          STATE.moves++;
          c.removed = true;
          if(c.flaw){ notify('Removed a flaw ✓','good'); } else { STATE.wrong++; notify('That was actually a strong element!','bad'); }
          render(); renderTopHUDOnly();
        };
      }
      container.appendChild(span);
    });
  }
  render();
  wireHint(sc);
  document.getElementById('reset-btn').onclick = ()=>{ chunks.forEach(c=>c.removed=false); render(); };
  document.getElementById('submit-btn').onclick = ()=>{
    const totalFlaws = chunks.filter(c=>c.flaw).length;
    const removedFlaws = chunks.filter(c=>c.flaw && c.removed).length;
    const wronglyRemovedGood = chunks.filter(c=>!c.flaw && c.removed).length;
    const accuracy = Math.max(0, (removedFlaws - wronglyRemovedGood) / totalFlaws);
    const pts = Math.round(accuracy * 100);
    STATE.accuracyPoints += pts; STATE.maxAccuracyPoints += 100;
    STATE.score += pts;
    scorePop(window.innerWidth/2, 100, `+${pts}`);
    if(removedFlaws===totalFlaws && wronglyRemovedGood===0){ notify('Flawless cleanup! 🧹✨','good'); STATE.optBonus += 10; STATE.score += 10; }
    else notify(`Removed ${removedFlaws}/${totalFlaws} flaws, kept ${wronglyRemovedGood} good parts by mistake`, wronglyRemovedGood?'bad':'good');
    STATE.perScenario.push({id:sc.id, type:'clean', accuracy});
    finishScenario();
  };
}

/* ============ 3. CHOOSE THE BEST PROMPT ============ */
function renderChoose(sc){
  const choices = shuffle(sc.bestChoices);
  let selected = null;
  app.innerHTML = `
    <div class="header"><h1>🧩 Prompt Puzzle</h1></div>
    <div id="hud-wrap">${renderHUD()}</div>
    <div class="panel">
      <span class="badge-type">${typeLabel('choose')}</span>
      <div class="scenario-title">Scenario</div>
      <div class="desired-output"><b>Desired Output:</b> ${esc(sc.desired)}</div>
      <div id="choices-wrap"></div>
      <div class="hint-box" id="hint-box"></div>
      <div class="action-row">
        <button class="btn" id="submit-btn" disabled>Lock In Choice →</button>
      </div>
    </div>
  `;
  const wrap = document.getElementById('choices-wrap');
  choices.forEach((c)=>{
    const div = document.createElement('div');
    div.className = 'choice-card';
    div.innerHTML = `<div class="label">Option ${c.label}</div><pre>${esc(c.text)}</pre>`;
    div.onclick = ()=>{
      STATE.moves++;
      document.querySelectorAll('.choice-card').forEach(x=>x.classList.remove('selected'));
      div.classList.add('selected');
      selected = c;
      document.getElementById('submit-btn').disabled = false;
    };
    wrap.appendChild(div);
  });
  wireHint(sc);
  document.getElementById('submit-btn').onclick = ()=>{
    const correct = selected.quality === 'optimized';
    const pts = correct ? 100 : 20;
    if(!correct) STATE.wrong++;
    STATE.accuracyPoints += pts; STATE.maxAccuracyPoints += 100;
    STATE.score += pts;
    scorePop(window.innerWidth/2, 100, `+${pts}`);
    if(correct){ notify('Correct! That prompt is optimally engineered ✅','good'); STATE.optBonus += 10; STATE.score += 10; }
    else notify(selected.quality==='over' ? 'That prompt was over-engineered — bloated scope hurts focus.' : 'That prompt was too weak/vague for reliable output.', 'bad');
    STATE.perScenario.push({id:sc.id, type:'choose', accuracy: correct?1:0.2});
    finishScenario();
  };
}

function finishScenario(){
  const sc = STATE.scenarios[STATE.idx];
  STATE.totalTime += (Date.now() - STATE.scenarioStartTime);
  setTimeout(()=>{
    renderReveal(sc);
  }, 300);
}

function renderReveal(sc){
  app.innerHTML = `
    <div class="header"><h1>🧩 Prompt Puzzle</h1></div>

  document.getElementById('next-btn').onclick = ()=>{

/* ============ REPORT ============ */
function computeReport(){
  const accPct = STATE.maxAccuracyPoints ? (STATE.accuracyPoints/STATE.maxAccuracyPoints) : 0;
  const timeSec = Math.round(STATE.totalTime/1000);
  const timeScore = Math.max(0, 100 - Math.min(100, timeSec/2)); // rough
  const movesScore = Math.max(0, 100 - STATE.moves*1.5);
  const wrongScore = Math.max(0, 100 - STATE.wrong*8);
  const hintScore = Math.max(0, 100 - STATE.hints*15);
  const finalScore = Math.round(
    accPct*100*0.45 + timeScore*0.1 + movesScore*0.15 + wrongScore*0.15 + hintScore*0.1 + Math.min(STATE.optBonus,60)*0.05
  );
  let rating, rank;
  if(finalScore>=90){ rating='Exceptional'; rank='🏆 Prompt Grandmaster'; }
  else if(finalScore>=75){ rating='Excellent'; rank='🥇 Prompt Architect'; }
  else if(finalScore>=60){ rating='Good'; rank='🥈 Prompt Engineer'; }
  else if(finalScore>=40){ rating='Developing'; rank='🥉 Prompt Apprentice'; }
  else { rating='Needs Practice'; rank='🔧 Prompt Novice'; }

  const dna = [
    {label:'Specificity', val: Math.min(100, accPct*100 + (STATE.optBonus>20?10:0)), color:'var(--blue)'},
    {label:'Structure', val: Math.max(0, 100 - STATE.wrong*10), color:'var(--teal)'},
    {label:'Efficiency', val: Math.max(0, movesScore), color:'var(--purple)'},
    {label:'Precision', val: Math.max(0, wrongScore), color:'var(--gold)'},
    {label:'Independence', val: Math.max(0, hintScore), color:'var(--green)'}
  ];
  return { finalScore, rating, rank, dna, timeSec, accPct };
}

function renderReport(){
  const r = computeReport();
  const bestScenario = STATE.scenarios[0];
  app.innerHTML = `
    <div class="header">

      <p>${STATE.domain} · ${STATE.difficulty}</p>
    </div>

        <div class="big-score">${r.finalScore}</div>

        <h3 style="font-size:14px; color:var(--muted); text-transform:uppercase; letter-spacing:1px;">Prompt DNA</h3>

          ${r.dna.map(d=>`
            <div class="dna-row">
              <div class="label">${d.label}</div>
              <div class="dna-track"><div class="dna-fill" style="width:${Math.round(d.val)}%; background:${d.color};"></div></div>
              <div style="width:34px; text-align:right; color:var(--muted);">${Math.round(d.val)}%</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:16px; font-size:12px; color:var(--muted);">
          Time: <b class="mono-data" style="color:var(--text)">${r.timeSec}s</b> ·
          Moves: <b class="mono-data" style="color:var(--text)">${STATE.moves}</b> ·
          Wrong: <b class="mono-data" style="color:var(--text)">${STATE.wrong}</b> ·
          Hints: <b class="mono-data" style="color:var(--text)">${STATE.hints}</b> ·

    </div>
  `;
  document.getElementById('replay-btn').onclick = ()=> initGame();
  document.getElementById('restart-btn').onclick = ()=> renderSetup();

function feedbackText(r){
  if(r.finalScore>=90) return "You consistently isolate role, task, constraints, and format — the exact anatomy of a production-grade prompt. You also correctly reject over-engineered bloat, which is rarer than avoiding vagueness.";
  if(r.finalScore>=75) return "Strong instinct for structured prompting. A few placements suggest you're occasionally tempted by scope-creep additions — tighten your filter for 'does this constraint change the output, or just add noise?'";
  if(r.finalScore>=60) return "You're identifying the right components but losing points on precision — likely mixing in filler or missing a key constraint. Focus on the four pillars: Role, Task, Constraint, Format.";
  if(r.finalScore>=40) return "You're building the right instincts, but distractors are catching you — vague filler and scope-creep phrases look convincing but weaken the prompt. Slow down and ask: 'does this block make the output more predictable?'";
  return "Focus on the fundamentals: every strong prompt names a role, a concrete task, explicit constraints, and a required output format. Revisit the Prompt Principle notes after each scenario before your next attempt.";
}
function nextMilestone(score){
  if(score>=90) return "Try Advanced scenarios in a new domain to stress-test your instincts across contexts.";
  if(score>=75) return "Push for a 90+ by eliminating scope-creep distractor picks entirely.";
  if(score>=60) return "Aim to finish a full run with zero hints and under 40 moves.";
  return "Replay this domain focused only on 'Choose the Best Prompt' rounds to build pattern recognition fast.";
}
