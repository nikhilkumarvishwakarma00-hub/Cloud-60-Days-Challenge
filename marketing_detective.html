<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Detective</title>
<style>
:root{
  --bg-0:#05070d;
  --bg-1:#0a0e1a;
  --bg-2:#101526;
  --cork:#1b1410;
  --cork-2:#241a14;
  --accent:#00d9ff;
  --accent-2:#1a56ff;
  --accent-glow:rgba(0,217,255,0.55);
  --paper:#f3ecd8;
  --paper-2:#e9dfc4;
  --ink:#241f16;
  --text-0:#e9f4ff;
  --text-1:#9db3cf;
  --danger:#ff4d6d;
  --good:#33ffc4;
  --pin:#ff5b5b;
  --font-head:'Space Grotesk',Georgia,serif;
  --font-body:'Inter',Arial,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg-0);color:var(--text-0);font-family:var(--font-body);overflow-x:hidden;}
#root{min-height:100vh;}
h1,h2,h3{font-family:var(--font-head);margin:0;}
::selection{background:var(--accent-glow);}
.scanline-bg{
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle at 20% 10%, rgba(0,217,255,0.08), transparent 40%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
}
.app-shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 26px;background:linear-gradient(180deg,var(--bg-1),rgba(10,14,26,0.4));
  border-bottom:1px solid rgba(0,217,255,0.15);position:sticky;top:0;z-index:50;
  backdrop-filter:blur(6px);
}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--font-head);font-weight:700;letter-spacing:0.5px;}
.brand .badge{
  width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--accent),var(--accent-2));
  display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 18px var(--accent-glow);
}
.progress-track{flex:1;max-width:340px;margin:0 24px;height:8px;border-radius:6px;background:rgba(255,255,255,0.08);overflow:hidden;position:relative;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-2),var(--accent));transition:width .5s ease;box-shadow:0 0 10px var(--accent-glow);}
.case-count{font-family:var(--font-mono);font-size:12px;color:var(--text-1);}
.btn{
  font-family:var(--font-body);font-weight:600;border:none;cursor:pointer;border-radius:10px;
  padding:12px 22px;font-size:14px;letter-spacing:0.3px;transition:transform .15s ease, box-shadow .2s ease, background .2s ease;
  background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#03101a;box-shadow:0 4px 18px rgba(0,217,255,0.25);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px var(--accent-glow);}
.btn:active{transform:translateY(0px) scale(.98);}
.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,0.18);color:var(--text-0);box-shadow:none;}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 14px rgba(0,217,255,0.2);}
.btn.small{padding:8px 14px;font-size:12px;}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* ---------- Intro ---------- */
.intro-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
.intro-card{
  max-width:640px;text-align:center;background:radial-gradient(circle at 50% 0%, rgba(0,217,255,0.08), transparent 60%),var(--bg-1);
  border:1px solid rgba(0,217,255,0.18);border-radius:20px;padding:52px 40px;
  box-shadow:0 30px 80px rgba(0,0,0,0.6), inset 0 0 60px rgba(0,217,255,0.03);
  animation:fadeUp .7s ease both;
}
.intro-card .eyebrow{font-family:var(--font-mono);color:var(--accent);letter-spacing:3px;font-size:12px;text-transform:uppercase;margin-bottom:14px;}
.intro-card h1{font-size:40px;background:linear-gradient(90deg,var(--text-0),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px;}
.intro-card p{color:var(--text-1);line-height:1.6;font-size:15px;margin:14px 0 28px;}
.magnifier{font-size:54px;margin-bottom:8px;filter:drop-shadow(0 0 20px var(--accent-glow));animation:float 3.4s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0px) rotate(-4deg);}50%{transform:translateY(-8px) rotate(4deg);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

/* ---------- Case Assignment ---------- */
.assign-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;}
.dossier{
  width:100%;max-width:640px;background:var(--paper);color:var(--ink);border-radius:6px;
  box-shadow:0 30px 70px rgba(0,0,0,0.65), 0 0 0 1px rgba(0,0,0,0.2);
  transform:rotate(-0.4deg);position:relative;padding:36px;
  background-image:
    repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0 2px, transparent 2px 4px);
  animation:dossierIn .6s cubic-bezier(.2,.8,.2,1) both;
}
@keyframes dossierIn{from{opacity:0;transform:translateY(40px) rotate(-4deg) scale(.96);}to{opacity:1;transform:translateY(0) rotate(-0.4deg) scale(1);}}
.dossier::before{
  content:'CONFIDENTIAL';position:absolute;top:18px;right:-6px;background:var(--pin);color:#fff;
  font-family:var(--font-mono);font-size:11px;letter-spacing:2px;padding:4px 30px;transform:rotate(8deg);box-shadow:0 4px 10px rgba(0,0,0,0.4);
}
.stamp{
  position:absolute;bottom:24px;right:28px;border:3px solid var(--danger);color:var(--danger);
  font-family:var(--font-mono);font-weight:700;padding:6px 14px;border-radius:6px;transform:rotate(-14deg);
  opacity:0.75;font-size:13px;letter-spacing:2px;
}
.dossier h2{font-family:var(--font-mono);font-size:13px;letter-spacing:3px;color:#6b5b3a;text-transform:uppercase;margin-bottom:6px;}
.dossier h1{font-size:28px;margin-bottom:18px;border-bottom:2px dashed #b7a878;padding-bottom:14px;}
.dossier-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-bottom:20px;}
.dossier-field label{display:block;font-family:var(--font-mono);font-size:10px;color:#7a6b45;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.dossier-field div.val{font-size:14px;font-weight:600;}
.dossier .objective-box{background:rgba(0,0,0,0.04);border-left:3px solid var(--accent-2);padding:12px 14px;border-radius:4px;font-size:14px;line-height:1.5;margin-bottom:24px;}
.dossier .actions{display:flex;justify-content:flex-end;gap:10px;}

/* ---------- Investigation Board ---------- */
.board-wrap{flex:1;padding:24px;display:flex;flex-direction:column;gap:18px;}
.board-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.board-header h1{font-size:22px;}
.board-header .sub{color:var(--text-1);font-size:13px;font-family:var(--font-mono);}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.tab-btn{
  font-family:var(--font-mono);font-size:12px;padding:9px 16px;border-radius:8px 8px 0 0;cursor:pointer;
  background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-bottom:none;color:var(--text-1);
  transition:all .2s ease;position:relative;
}
.tab-btn.active{background:var(--bg-2);color:var(--accent);border-color:rgba(0,217,255,0.35);box-shadow:0 -6px 16px rgba(0,217,255,0.08);}
.tab-btn .lock{margin-left:6px;opacity:0.6;}
.corkboard{
  flex:1;border-radius:16px;position:relative;padding:26px;min-height:420px;
  background:
    radial-gradient(circle at 15% 20%, rgba(255,255,255,0.04), transparent 30%),
    repeating-radial-gradient(circle at 0 0, rgba(0,0,0,0.15) 0, transparent 2px),
    linear-gradient(160deg,var(--cork),var(--cork-2));
  border:10px solid #14100c;box-shadow:inset 0 0 60px rgba(0,0,0,0.55), 0 20px 50px rgba(0,0,0,0.5);
  overflow:hidden;
}
.corkboard .grain{position:absolute;inset:0;opacity:0.5;background-image:
  radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);background-size:6px 6px;pointer-events:none;}
.panel-fade{animation:panelIn .4s ease both;}
@keyframes panelIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.sticky{
  background:linear-gradient(160deg,#fff7bd,#ffe98a);color:#3a2f0c;border-radius:3px;
  padding:14px 16px;box-shadow:0 10px 20px rgba(0,0,0,0.35);font-size:13px;line-height:1.45;
  position:relative;transform:rotate(-1.2deg);min-height:90px;
}
.sticky.blue{background:linear-gradient(160deg,#bff2ff,#8fe3ff);color:#052c38;}
.sticky.pink{background:linear-gradient(160deg,#ffd6ea,#ffb3d9);color:#3a0d28;}
.pin-dot{
  width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#ff9b9b,var(--pin));
  position:absolute;top:-7px;left:50%;transform:translateX(-50%);box-shadow:0 3px 6px rgba(0,0,0,0.5);
}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;position:relative;z-index:1;}
.info-card{
  background:var(--bg-1);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 18px;
  transition:transform .2s ease, border-color .2s ease, box-shadow .2s ease;
}
.info-card:hover{transform:translateY(-3px);border-color:rgba(0,217,255,0.3);box-shadow:0 12px 24px rgba(0,0,0,0.4);}
.info-card h4{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.info-card .value{font-size:15px;font-weight:600;}
.info-card ul{margin:6px 0 0;padding-left:18px;font-size:13px;color:var(--text-1);}
.metric-bars{display:flex;flex-direction:column;gap:10px;}
.metric-row{display:grid;grid-template-columns:110px 1fr 60px;align-items:center;gap:10px;}
.metric-row .label{font-family:var(--font-mono);font-size:11px;color:var(--text-1);}
.metric-track{height:10px;border-radius:6px;background:rgba(255,255,255,0.06);overflow:hidden;}
.metric-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent-2),var(--accent));width:0;transition:width 1.1s cubic-bezier(.2,.9,.2,1);box-shadow:0 0 10px var(--accent-glow);}
.metric-val{font-family:var(--font-mono);font-size:12px;text-align:right;color:var(--text-0);}
.comment-bubble{
  background:var(--bg-2);border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:10px;border-left:3px solid var(--accent-2);
  color:var(--text-1);position:relative;
}
.comment-bubble strong{color:var(--text-0);}
.social-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;}
.social-stat{background:var(--bg-2);border-radius:12px;padding:16px;text-align:center;border:1px solid rgba(255,255,255,0.06);}
.social-stat .num{font-family:var(--font-mono);font-size:22px;color:var(--accent);font-weight:700;}
.social-stat .lbl{font-size:11px;color:var(--text-1);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}

/* Evidence / drag */
.evidence-zone{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;position:relative;z-index:1;}
.evidence-note{
  width:170px;min-height:110px;cursor:grab;user-select:none;
  transition:transform .15s ease, box-shadow .2s ease;
}
.evidence-note:active{cursor:grabbing;}
.evidence-note.dragging{opacity:0.35;}
.evidence-note .tag{font-family:var(--font-mono);font-size:9px;text-transform:uppercase;opacity:0.6;letter-spacing:1px;}
.drop-slot{
  flex:1;min-width:220px;min-height:130px;border:2px dashed rgba(0,217,255,0.35);border-radius:14px;
  display:flex;align-items:center;justify-content:center;text-align:center;padding:16px;color:var(--text-1);
  font-family:var(--font-mono);font-size:12px;transition:all .2s ease;background:rgba(0,217,255,0.03);
}
.drop-slot.over{background:rgba(0,217,255,0.12);border-color:var(--accent);box-shadow:0 0 24px rgba(0,217,255,0.2);}
.drop-slot.filled{border-style:solid;background:rgba(0,217,255,0.06);}
.pinned-wrap{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}

/* Solve modal */
.overlay{position:fixed;inset:0;background:rgba(2,4,10,0.78);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .25s ease both;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{
  background:var(--bg-1);border:1px solid rgba(0,217,255,0.2);border-radius:18px;max-width:560px;width:100%;
  padding:32px;box-shadow:0 40px 100px rgba(0,0,0,0.7);max-height:86vh;overflow-y:auto;
  animation:dossierIn .4s ease both;
}
.modal h2{font-size:22px;margin-bottom:6px;}
.modal .hint{color:var(--text-1);font-size:13px;margin-bottom:20px;}
.option-btn{
  display:block;width:100%;text-align:left;background:var(--bg-2);border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;padding:14px 16px;margin-bottom:10px;color:var(--text-0);cursor:pointer;font-size:14px;
  transition:all .18s ease;
}
.option-btn:hover{border-color:var(--accent);background:rgba(0,217,255,0.06);transform:translateX(4px);}
.option-btn.correct{border-color:var(--good);background:rgba(51,255,196,0.1);box-shadow:0 0 20px rgba(51,255,196,0.25);}
.option-btn.wrong{border-color:var(--danger);background:rgba(255,77,109,0.1);}
.option-btn:disabled{cursor:default;}

/* Case closed */
.closed-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;position:relative;}
.stamp-big{
  font-family:var(--font-mono);font-weight:800;color:var(--danger);border:6px solid var(--danger);
  padding:14px 46px;font-size:34px;letter-spacing:6px;border-radius:10px;transform:rotate(-10deg) scale(1.6);
  opacity:0;animation:stampSlam .55s cubic-bezier(.2,1.6,.4,1) 0.15s forwards;
  box-shadow:0 0 40px rgba(255,77,109,0.35);
}
@keyframes stampSlam{0%{opacity:0;transform:rotate(-10deg) scale(2.4);}60%{opacity:1;}100%{opacity:0.9;transform:rotate(-10deg) scale(1);}}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.confetti span{
  position:absolute;top:-10px;width:8px;height:14px;background:var(--accent);opacity:0.85;
  animation:fall linear forwards;
}
@keyframes fall{to{transform:translateY(110vh) rotate(400deg);opacity:0;}}

/* Report */
.report-wrap{flex:1;padding:30px;display:flex;justify-content:center;}
.report-card{max-width:760px;width:100%;background:var(--bg-1);border:1px solid rgba(0,217,255,0.18);border-radius:18px;padding:34px;box-shadow:0 30px 70px rgba(0,0,0,0.55);animation:fadeUp .5s ease both;}
.report-card h1{font-size:26px;margin-bottom:6px;}
.report-card .score-chip{display:inline-block;font-family:var(--font-mono);background:rgba(0,217,255,0.1);color:var(--accent);border:1px solid rgba(0,217,255,0.3);padding:6px 14px;border-radius:20px;font-size:12px;margin-bottom:20px;}
.section-title{font-family:var(--font-mono);font-size:12px;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;margin:22px 0 10px;}
.improve-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px;}
.improve-list li{background:var(--bg-2);border-left:3px solid var(--good);padding:12px 14px;border-radius:8px;font-size:14px;color:var(--text-1);}
.improve-list li strong{color:var(--text-0);}
.report-actions{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap;}

@media (max-width:720px){
  .dossier-grid{grid-template-columns:1fr;}
  .progress-track{display:none;}
  .metric-row{grid-template-columns:90px 1fr 50px;}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo } = React;

/* ============ CASE DATA ============ */
const CASES = [
{
  company:"LumeWear",
  industry:"Direct-to-Consumer Fashion",
  objective:"Drive first-time purchases of a new sustainable activewear line through a 6-week paid social launch.",
  audience:"Urban women, 22-34, eco-conscious, mid-to-high income",
  channels:["Instagram Ads","TikTok Influencers","Email"],
  budget:{ "Instagram Ads":45, "TikTok Influencers":40, "Email":15 },
  metrics:{ reach:"2.1M", ctr:"0.4%", engagement:"6.8%", conversions:"0.3%", sales:"$18,200" },
  comments:[
    "\"Loved the reel but the site took forever to load on my phone.\"",
    "\"Added to cart, got distracted, never got a reminder email.\"",
    "\"Checkout asked me to create an account before I could even see the total price.\""
  ],
  social:{ likes:"312K", shares:"9.4K", comments:"4.1K", followersGained:"+21K" },
  mistake:"High-performing top-of-funnel creative was not backed by a matching mobile checkout experience, causing massive drop-off between click and purchase.",
  clues:[
    "CTR and engagement were both strong, but conversion rate was less than 1/10th the industry benchmark.",
    "Customer comments repeatedly mention slow load times and forced account creation at checkout.",
    "No abandoned-cart email sequence existed despite email being a funded channel."
  ],
  explanation:"LumeWear nailed audience targeting and creative — reach and engagement prove the message resonated. But the campaign broke down at the conversion layer: a slow, friction-heavy mobile checkout combined with zero cart-abandonment recovery meant thousands of interested buyers never became customers. The 'mistake' is a broken bottom-of-funnel experience, not a targeting or creative problem.",
  improvements:[
    "Audit and optimize mobile checkout speed before scaling any paid spend.",
    "Offer guest checkout; delay account creation until after purchase.",
    "Deploy a 3-email abandoned-cart flow within 1 hour, 24 hours, and 72 hours of drop-off."
  ]
},
{
  company:"BrewBridge Coffee Co.",
  industry:"Food & Beverage (Subscription)",
  objective:"Grow monthly subscription sign-ups for a specialty coffee box using a referral-driven growth loop.",
  audience:"Coffee enthusiasts, 28-45, remote workers, willing to pay premium",
  channels:["Referral Program","Podcast Sponsorships","Instagram"],
  budget:{ "Podcast Sponsorships":50, "Referral Program":30, "Instagram":20 },
  metrics:{ reach:"860K", ctr:"1.1%", engagement:"4.2%", conversions:"2.9%", sales:"$54,000" },
  comments:[
    "\"I referred 3 friends and never got my free bag — is this a scam?\"",
    "\"Great coffee, but I gave up trying to find my referral code in the app.\"",
    "\"Heard about it on my favorite podcast, easy to sign up though.\""
  ],
  social:{ likes:"41K", shares:"1.2K", comments:"3.8K", followersGained:"+6K" },
  mistake:"The referral program was promoted heavily but the redemption mechanism was broken and confusing, destroying trust and word-of-mouth momentum.",
  clues:[
    "Referral Program received the largest complaint volume of any channel despite decent overall conversion.",
    "Multiple comments describe reward redemption as hidden or non-functional.",
    "Podcast-driven signups convert better than referral-driven signups, the reverse of what was projected."
  ],
  explanation:"BrewBridge built genuine top-of-funnel interest via podcasts, but the referral loop — the growth engine the budget leaned on hardest — was undermined by a broken, hard-to-find reward redemption flow. Instead of compounding growth, it created public trust issues that likely suppressed future referrals.",
  improvements:[
    "Simplify referral tracking with a single visible dashboard link in-app and via email.",
    "Automate reward fulfillment with confirmation emails at each referral milestone.",
    "Pause referral ad spend until the redemption bug is fixed and tested end-to-end."
  ]
},
{
  company:"PulseFit Studios",
  industry:"Fitness / Wellness",
  objective:"Fill new member slots for a boutique HIIT studio opening in a new city via a localized launch campaign.",
  audience:"Young professionals, 25-40, within 5km of studio location",
  channels:["Google Local Ads","Facebook Events","Flyering"],
  budget:{ "Google Local Ads":55, "Facebook Events":30, "Flyering":15 },
  metrics:{ reach:"140K", ctr:"3.2%", engagement:"5.5%", conversions:"11%", sales:"$31,500" },
  comments:[
    "\"Booked a free trial class three times, it was always full when I showed up.\"",
    "\"Great ad, but the map link took me to the wrong building.\"",
    "\"Class was amazing once I actually got in!\""
  ],
  social:{ likes:"18K", shares:"640", comments:"1.9K", followersGained:"+2.4K" },
  mistake:"Demand generation outpaced operational capacity — the studio oversold trial classes without a waitlist or overflow system, converting eager leads into frustrated ones.",
  clues:[
    "Conversion rate on ads was excellent (11%) yet churn after the trial stage was unusually high.",
    "Multiple comments describe overbooked classes and being turned away.",
    "A wrong address persisted on the Google Local Ad for over a week."
  ],
  explanation:"The marketing itself worked almost too well: strong local targeting drove more demand than the studio could physically serve. Compounded by a stale, incorrect address on a live ad, first impressions were damaged before people even got a workout in — turning marketing success into an operational and reputational liability.",
  improvements:[
    "Add a real-time class capacity counter and automatic waitlist to the booking flow.",
    "Audit all live ad assets weekly for accuracy (address, hours, offers).",
    "Throttle paid spend to match confirmed available trial slots per week."
  ]
},
{
  company:"NestNote",
  industry:"SaaS (Productivity)",
  objective:"Convert free-tier users of a note-taking app into paid subscribers via an in-app upgrade campaign.",
  audience:"Existing free users active for 30+ days",

/* ============ THEMES ============ */
const THEMES = {
  neon: { accent:"#00d9ff", accent2:"#1a56ff", name:"Neon Blue" },
  orange: { accent:"#ff8a3d", accent2:"#ff5b1f", name:"Claude Orange" },
  noir: { accent:"#7ea8ff", accent2:"#3a5ccc", name:"Noir Blue" },
  emerald: { accent:"#33ffc4", accent2:"#00b894", name:"Emerald Vice" },
  crimson: { accent:"#ff5b7a", accent2:"#c0304d", name:"Crimson Case" }
};

function applyTheme(key){
  const t = THEMES[key] || THEMES.neon;
  const root = document.documentElement.style;
  root.setProperty('--accent', t.accent);
  root.setProperty('--accent-2', t.accent2);
  root.setProperty('--accent-glow', t.accent + "88");
}

/* ============ HELPERS ============ */
function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pctFromMetric(str, type){
  // convert metric strings to a 0-100 bar width for visual flair
  const n = parseFloat(str.replace(/[^0-9.]/g,''));
  if(type==="ctr" || type==="conversions") return Math.min(100, n*20);
  if(type==="engagement") return Math.min(100, n*7);
  return Math.min(100, 60 + (n%40));
}

function EvidencePanel({ data, pinned, onPin }){
  const dragItem = useRef(null);
  const [overSlot, setOverSlot] = useState(false);

  function handleDragStart(idx){ dragItem.current = idx; }
  function handleDrop(e){
    e.preventDefault();
    setOverSlot(false);
    if(dragItem.current !== null){ onPin(dragItem.current); dragItem.current = null; }
  }

  return (
    <div className="panel-fade">
      <p style={{color:"var(--text-1)", fontSize:13, marginBottom:14}}>
        Drag each clue onto the board below to pin it to your case wall.
      </p>
      <div className="evidence-zone">
        {data.clues.map((c,i)=>{
          if(pinned.includes(i)) return null;
          return (
            <div
              key={i}
              className="evidence-note"
              draggable
              onDragStart={()=>handleDragStart(i)}
            >
              <Sticky text={c} color={["blue","pink",""][i%3]} />
            </div>
          );
        })}
        <div
          className={"drop-slot " + (overSlot?"over ":"") + (pinned.length?"filled":"")}
          onDragOver={(e)=>{e.preventDefault(); setOverSlot(true);}}
          onDragLeave={()=>setOverSlot(false)}
          onDrop={handleDrop}
        >
          {pinned.length===0 ? "Drop clues here to pin them" : `${pinned.length} of ${data.clues.length} clues pinned`}
        </div>
      </div>
      {pinned.length>0 && (
        <div className="pinned-wrap" style={{marginTop:18}}>
          {pinned.map(i=>(
            <Sticky key={i} text={data.clues[i]} color={["blue","pink",""][i%3]} style={{width:200}} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ============ INVESTIGATION BOARD ============ */
function InvestigationBoard({ data, onSolve }){
  const tabs = [
    {key:"overview", label:"Overview"},
    {key:"metrics", label:"Metrics"},
    {key:"comments", label:"Comments"},
    {key:"social", label:"Social"},
    {key:"evidence", label:"Evidence"},
  ];
  const [active, setActive] = useState("overview");
  const [visited, setVisited] = useState({overview:true});
  const [pinned, setPinned] = useState([]);

  function goto(key){
    setActive(key);
    setVisited(v=>({...v,[key]:true}));
  }
  function pinClue(idx){
    setPinned(p=> p.includes(idx) ? p : [...p, idx]);
  }

  const allVisited = tabs.every(t=>visited[t.key]);
  const allPinned = pinned.length >= data.clues.length;
  const canSolve = allVisited && allPinned;

  return (
    <div className="board-wrap">
      <div className="board-header">
        <div>
          <h1>{data.company} — Investigation Board</h1>
          <div className="sub">Review every folder, then pin all evidence before you can solve the case.</div>
        </div>
        <button className="btn" disabled={!canSolve} onClick={onSolve}>
          {canSolve ? "Solve the Case →" : `Review all folders & pin ${data.clues.length} clues`}
        </button>
      </div>
      <div className="tabs">
        {tabs.map(t=>(
          <div key={t.key} className={"tab-btn "+(active===t.key?"active":"")} onClick={()=>goto(t.key)}>
            {t.label} {visited[t.key] ? "✓" : ""}
          </div>
        ))}
      </div>
      <div className="corkboard">
        <div className="grain"></div>
        {active==="overview" && <OverviewPanel data={data} />}
        {active==="metrics" && <MetricsPanel data={data} />}
        {active==="comments" && <CommentsPanel data={data} />}
        {active==="social" && <SocialPanel data={data} />}
        {active==="evidence" && <EvidencePanel data={data} pinned={pinned} onPin={pinClue} />}
      </div>
    </div>
  );
}

/* ============ SOLVE MODAL ============ */
function SolveModal({ data, allCases, onResolved, onClose }){
  const options = useMemo(()=>{
    const distractors = shuffle(allCases.filter(c=>c.company!==data.company))
      .slice(0,3)
      .map(c=>c.mistake);
    return shuffle([data.mistake, ...distractors]);
  }, [data]);
  const [selected, setSelected] = useState(null);
  const [locked, setLocked] = useState(false);

  function choose(opt){
    if(locked) return;
    setSelected(opt);
    setLocked(true);
    setTimeout(()=> onResolved(opt === data.mistake), 1100);
  }

  return (
    <div className="overlay">
      <div className="modal">
        <h2>What was the real mistake?</h2>
        <div className="hint">Choose the explanation that best fits every piece of evidence you gathered.</div>
        {options.map((opt,i)=>{
          let cls = "option-btn";
          if(locked && opt===data.mistake) cls += " correct";
          else if(locked && opt===selected) cls += " wrong";
          return (
            <button key={i} className={cls} disabled={locked} onClick={()=>choose(opt)}>{opt}</button>
          );
        })}
      </div>
    </div>
  );
}

function CaseClosed({ correct, onContinue }){
  const confettiPieces = useMemo(()=>Array.from({length:36}).map((_,i)=>({
    left: Math.random()*100,
    delay: Math.random()*0.6,
    duration: 2.2+Math.random()*1.6,
    hue: Math.random()>0.5 ? "var(--accent)" : "var(--accent-2)"
  })), []);
  return (
    <div className="closed-wrap">
      {correct && (
        <div className="confetti">
          {confettiPieces.map((p,i)=>(
            <span key={i} style={{
              left:p.left+"%",
              background:p.hue,
              animationDelay:p.delay+"s",
              animationDuration:p.duration+"s"
            }}></span>
          ))}
        </div>
      )}
      <div style={{textAlign:"center"}}>
        <div className="stamp-big">{correct ? "CASE CLOSED" : "CASE REOPENED"}</div>
        <p style={{color:"var(--text-1)", marginTop:26, fontSize:15}}>
          {correct ? "Sharp eyes, detective. The evidence lines up perfectly." : "Not quite — but every good detective learns from a wrong lead."}
        </p>
        <button className="btn" style={{marginTop:20}} onClick={onContinue}>View Learning Report →</button>
      </div>
    </div>
  );
}

/* ============ LEARNING REPORT ============ */
function LearningReport({ data, correct, onNewCase }){
  return (
    <div className="report-wrap">
      <div className="report-card">
        <h1>Learning Report — {data.company}</h1>
        <div className="score-chip">{correct ? "✓ Solved on first guess" : "Solved after review"}</div>

        <div className="section-title">The Real Mistake</div>
        <p style={{color:"var(--text-1)", lineHeight:1.6}}>{data.mistake}</p>

        <div className="section-title">Full Explanation</div>
        <p style={{color:"var(--text-1)", lineHeight:1.6}}>{data.explanation}</p>

        <div className="section-title">Suggested Improvements</div>
        <ul className="improve-list">
          {data.improvements.map((imp,i)=><li key={i}><strong>{i+1}.</strong> {imp}</li>)}
        </ul>

        <div className="report-actions">
          <button className="btn" onClick={onNewCase}>Open a New Case →</button>
        </div>
      </div>
    </div>
  );
}

/* ============ APP ROOT ============ */
function App(){
  const [theme, setTheme] = useState(null);
  const [step, setStep] = useState("assignment"); // assignment, board, solve, closed, report
  const [caseData, setCaseData] = useState(()=>CASES[Math.floor(Math.random()*CASES.length)]);
  const [wasCorrect, setWasCorrect] = useState(true);
  const [showIntro, setShowIntro] = useState(true);

  useEffect(()=>{ if(theme) applyTheme(theme); }, [theme]);

  function pickNewCase(){
    setCaseData(CASES[Math.floor(Math.random()*CASES.length)]);
    setStep("assignment");
  }

  if(!theme){
    return (
      <div className="app-shell">
        <div className="scanline-bg"></div>
        <div className="intro-wrap">
          <div className="intro-card">
            <div className="magnifier">🎨</div>
            <div className="eyebrow">Case Files · Marketing Division</div>
            <h1>Choose Your Theme</h1>
            <p>Pick the visual style for your investigation before the first case file lands on your desk.</p>
            <div style={{display:"flex", gap:12, flexWrap:"wrap", justifyContent:"center"}}>
              {Object.entries(THEMES).map(([key,t])=>(
                <button key={key} className="btn ghost" style={{borderColor:t.accent, color:t.accent}}
                  onClick={()=>setTheme(key)}>
                  {t.name}
                </button>
              ))}
            </div>
          </div>
        </div>
      </div>
    );
  }

  if(showIntro){
    return (
      <div className="app-shell">
        <div className="scanline-bg"></div>
        <Intro onStart={()=>setShowIntro(false)} />
      </div>
    );
  }

  return (
    <div className="app-shell">
      <div className="scanline-bg"></div>
      <TopBar step={step} caseIndex={CASES.indexOf(caseData)} total={CASES.length} />

      {step==="assignment" && (
        <CaseAssignment data={caseData} onInvestigate={()=>setStep("board")} />
      )}

      {step==="board" && (
        <InvestigationBoard data={caseData} onSolve={()=>setStep("solve")} />
      )}

      {step==="solve" && (
        <React.Fragment>
          <InvestigationBoard data={caseData} onSolve={()=>{}} />
          <SolveModal
            data={caseData}
            allCases={CASES}
            onResolved={(correct)=>{ setWasCorrect(correct); setStep("closed"); }}
            onClose={()=>setStep("board")}
          />
        </React.Fragment>
      )}

      {step==="closed" && (
        <CaseClosed correct={wasCorrect} onContinue={()=>setStep("report")} />
      )}

      {step==="report" && (
        <LearningReport data={caseData} correct={wasCorrect} onNewCase={pickNewCase} />
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
