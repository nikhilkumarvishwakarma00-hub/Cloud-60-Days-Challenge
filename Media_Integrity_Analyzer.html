<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Integrity Analyzer</title>
<style>
/* ============================================================
   ROOT & THEME VARIABLES
   ============================================================ */
:root {
  --bg0: #07090f;
  --bg1: #0d1120;
  --bg2: #111827;
  --bg3: #1a2236;
  --line: #1e2d46;
  --t0: #e8ecf4;
  --t1: #8fa3c5;
  --t2: #4a5e7a;
  --acc: #ff6b35;
  --acc-l: #ff9a5c;
  --acc-d: #cc4d1a;
  --acc-glow: rgba(255, 107, 53, 0.15);
  --red: #ff3d5a;
  --green: #22c55e;
  --amber: #f59e0b;
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg0);
  color: var(--t0);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg1); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }
::selection { background: var(--acc); color: #fff; }

/* ============================================================
   LAYOUT
   ============================================================ */
#app { min-height: 100vh; transition: opacity 0.2s ease; }
.shell {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 20px 80px;
}
.center { text-align: center; }
.gap { margin-top: 14px; }
.gap-lg { margin-top: 24px; }
.gap-xl { margin-top: 36px; }

/* ============================================================
   TOPBAR & PROGRESS
   ============================================================ */
.topbar {
  position: sticky; top: 0; z-index: 90;
  background: rgba(7,9,15,0.9);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}
.tb-brand { display: flex; align-items: center; gap: 9px; }
.tb-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: linear-gradient(135deg, var(--acc), var(--acc-l));
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff;
  box-shadow: 0 0 14px var(--acc-glow);
}
.tb-title { font-size: 13px; font-weight: 700; color: var(--t0); letter-spacing: 0.01em; }
.tb-title span { color: var(--t2); font-weight: 500; }
.step-dots { display: flex; align-items: center; gap: 6px; }
.step-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--line); transition: all 0.4s ease;
}
.step-dot.done { background: var(--acc); opacity: 0.6; }
.step-dot.active { background: var(--acc); width: 20px; border-radius: 4px; box-shadow: 0 0 8px var(--acc-glow); }

/* ============================================================
   SECTION HEADERS
   ============================================================ */
.sec-tag {
  display: inline-block;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--acc);
  background: var(--acc-glow);
  border: 1px solid color-mix(in srgb, var(--acc) 30%, transparent);
  border-radius: 999px;
  padding: 3px 12px;
  margin-bottom: 14px;
}
.sec-head {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(22px, 4vw, 34px);
  font-weight: 700;
  line-height: 1.15;
  color: var(--t0);
  letter-spacing: -0.02em;
  margin-bottom: 12px;
}
.sec-sub {
  font-size: 15px;
  color: var(--t1);
  line-height: 1.65;
  max-width: 620px;
}
.sec-sub b { color: var(--t0); }

/* ============================================================
   CARDS
   ============================================================ */
.card {
  background: linear-gradient(160deg, var(--bg2), var(--bg1));
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 22px 24px;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
}
.card-sm { border-radius: 12px; padding: 14px 16px; }
.card-accent {
  background: linear-gradient(160deg, color-mix(in srgb, var(--acc) 8%, var(--bg2)), var(--bg1));
  border-color: color-mix(in srgb, var(--acc) 30%, transparent);
}
.card-red {
  background: linear-gradient(160deg, rgba(255,61,90,0.07), var(--bg1));
  border-color: rgba(255,61,90,0.3);
}
.card-green {
  background: linear-gradient(160deg, rgba(34,197,94,0.07), var(--bg1));
  border-color: rgba(34,197,94,0.3);
}

/* ============================================================
   CONCEPT BOX
   ============================================================ */
.concept-box {
  border-radius: 14px;
  border: 1px solid color-mix(in srgb, var(--acc) 25%, transparent);
  background: color-mix(in srgb, var(--acc) 6%, var(--bg1));
  padding: 18px 20px;
  margin-bottom: 20px;
}
.concept-label {
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--acc); margin-bottom: 8px;
}
.concept-box p { font-size: 13.5px; color: var(--t1); line-height: 1.65; }
.concept-box p + p { margin-top: 8px; }
.concept-box p b { color: var(--t0); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 12px 24px;
  border-radius: 10px;
  font-weight: 700; font-size: 14px;
  transition: all 0.18s ease;
  cursor: pointer;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--acc), var(--acc-l));
  color: #fff;
  box-shadow: 0 6px 20px var(--acc-glow);
  border: none;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 28px var(--acc-glow); }
.btn-ghost {
  background: var(--bg3);
  color: var(--t0);
  border: 1px solid var(--line);
}
.btn-ghost:hover { border-color: var(--acc); color: var(--acc); }
.btn-block { width: 100%; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
.btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 22px; }

/* ============================================================
   CLICKABLE SEGMENTS (Headline & Post words)
   ============================================================ */
.headline-display {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(17px, 3vw, 23px);
  line-height: 1.4;
  color: var(--t0);
  font-weight: 700;
  letter-spacing: -0.01em;
}
.post-display {
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--t0);
}
.seg {
  display: inline;
  transition: background 0.15s, color 0.15s;
  border-radius: 4px;
  padding: 1px 2px;
}
.seg.clickable { cursor: pointer; }
.seg.clickable:hover { background: rgba(255,255,255,0.08); }
.seg.flagged {
  background: rgba(251,191,36,0.22);
  color: var(--amber);
  outline: 1px solid rgba(251,191,36,0.4);
  border-radius: 4px;
}
.seg.reveal-correct {
  background: rgba(34,197,94,0.2);
  color: #86efac;
  outline: 1px solid rgba(34,197,94,0.5);
  border-radius: 4px;
}
.seg.reveal-missed {
  background: rgba(255,61,90,0.18);
  color: #fca5a5;
  outline: 1px dashed rgba(255,61,90,0.6);
  border-radius: 4px;
}
.seg.reveal-emotional {
  background: rgba(251,191,36,0.2);
  color: #fde68a;
  outline: 1px solid rgba(251,191,36,0.5);
  border-radius: 4px;
}
.seg-legend {
  display: flex; gap: 14px; flex-wrap: wrap;
  margin-top: 14px; font-size: 12px; color: var(--t2);
}
.seg-legend span { display: flex; align-items: center; gap: 5px; }
.legend-dot {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}

/* ============================================================
   METRIC BARS
   ============================================================ */
.metric-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .metric-panel { grid-template-columns: 1fr; } }
.metric-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
}
.metric-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--t2); margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.metric-value-display {
  font-size: 22px; font-weight: 800;
  font-variant-numeric: tabular-nums;
  font-family: Georgia, serif;
  margin-bottom: 8px;
}
.metric-sub { font-size: 11.5px; color: var(--t2); line-height: 1.5; }
.bar-track {
  height: 8px; background: var(--bg3); border-radius: 4px;
  overflow: hidden; margin-bottom: 5px;
  border: 1px solid rgba(255,255,255,0.04);
}
.bar-fill {
  height: 100%; border-radius: 4px;
  transition: width 1.2s cubic-bezier(0.22, 0.9, 0.3, 1);
}
.bar-acc { background: linear-gradient(90deg, var(--acc-d), var(--acc)); }
.bar-green { background: linear-gradient(90deg, #16a34a, var(--green)); }
.bar-amber { background: linear-gradient(90deg, #d97706, var(--amber)); }
.bar-red { background: linear-gradient(90deg, #be123c, var(--red)); }

/* ============================================================
   THEME PICKER
   ============================================================ */
.theme-picker-wrap {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 20px;
}
.theme-options { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; margin: 28px 0; }
.theme-opt {
  width: 100px;
  background: var(--bg2);
  border: 2px solid var(--line);
  border-radius: 14px;
  padding: 18px 10px 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: center;
}
.theme-opt:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
.theme-opt.selected { border-color: var(--t-color); box-shadow: 0 0 20px rgba(0,0,0,0.3); }
.theme-swatch {
  width: 38px; height: 38px; border-radius: 50%;
  margin: 0 auto 10px;
  transition: transform 0.2s;
}
.theme-opt.selected .theme-swatch { transform: scale(1.15); }
.theme-name { font-size: 12px; font-weight: 700; color: var(--t1); }

/* ============================================================
   CHALLENGE ARTICLES / POSTS
   ============================================================ */
.article-wrap {
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  margin-top: 18px;
}
.article-source-bar {
  background: var(--bg3);
  border-bottom: 1px solid var(--line);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px;
}
.source-name { font-size: 12.5px; font-weight: 700; color: var(--t0); }
.source-note { font-size: 11px; color: var(--t2); }
.article-body { padding: 18px 20px; background: var(--bg2); }
.article-body p { font-size: 13.5px; color: var(--t1); line-height: 1.75; margin-bottom: 12px; }
.article-body p:last-child { margin-bottom: 0; }

.social-post-wrap {
  border-radius: 14px; border: 1px solid var(--line);
  background: var(--bg2); overflow: hidden; margin-top: 18px;
}
.social-post-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: 1px solid var(--line);
}
.social-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: linear-gradient(135deg, var(--acc-d), var(--acc-l));
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0;
}
.social-author-name { font-size: 14px; font-weight: 700; }
.social-meta { font-size: 12px; color: var(--t2); }
.social-platform-badge {
  margin-left: auto; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 999px;
  background: var(--bg3); border: 1px solid var(--line); color: var(--t2);
}
.social-post-body { padding: 16px; font-size: 14.5px; color: var(--t0); line-height: 1.7; }
.social-post-stats {
  display: flex; gap: 20px;
  padding: 12px 16px; border-top: 1px solid var(--line);
  font-size: 12px; color: var(--t2);
}
.social-post-stats span b { color: var(--t1); }

/* ============================================================
   REVEAL PANELS
   ============================================================ */
.reveal-panel {
  border-radius: 14px; border: 1px solid var(--line);
  background: var(--bg2); padding: 20px 22px;
  animation: fadeUp 0.4s ease;
}
.reveal-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--line); }
.reveal-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
.reveal-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  font-weight: 700; color: var(--t2); margin-bottom: 8px;
}
.reveal-score-big {
  font-family: Georgia, serif;
  font-size: 48px; font-weight: 700;
  margin-bottom: 4px;
}
.technique-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
.technique-tag {
  font-size: 11.5px; font-weight: 600;
  padding: 3px 11px; border-radius: 999px;
  background: rgba(255,61,90,0.12);
  color: var(--red); border: 1px solid rgba(255,61,90,0.3);
}
.fair-headline {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 17px; font-weight: 700;
  color: var(--green); line-height: 1.3;
  margin-top: 8px;
}
.takeaway-box {
  background: var(--bg3); border-left: 3px solid var(--acc);
  border-radius: 0 10px 10px 0; padding: 13px 15px;
  font-size: 13.5px; color: var(--t1); line-height: 1.65;
  margin-top: 8px;
}
.takeaway-box b { color: var(--t0); }

/* ============================================================
   EMOTION BUTTONS
   ============================================================ */
.emotion-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
.emotion-btn {
  padding: 9px 18px; border-radius: 999px;
  font-size: 13px; font-weight: 600;
  background: var(--bg3); color: var(--t1);
  border: 1px solid var(--line);
  cursor: pointer; transition: all 0.15s;
}
.emotion-btn:hover { border-color: var(--acc); color: var(--acc); }
.emotion-btn.selected {
  background: var(--acc-glow);
  color: var(--acc); border-color: var(--acc);
  box-shadow: 0 0 12px var(--acc-glow);
}

/* ============================================================
   CLICK RESPONSE BUTTONS
   ============================================================ */
.click-opts { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.click-opt {
  flex: 1; min-width: 100px;
  padding: 12px 16px; border-radius: 10px;
  font-weight: 700; font-size: 14px;
  background: var(--bg3); color: var(--t0);
  border: 1px solid var(--line);
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.click-opt:hover { border-color: var(--acc); }
.click-opt.selected { background: var(--acc-glow); border-color: var(--acc); color: var(--acc); }

/* ============================================================
   DASHBOARD / FINAL
   ============================================================ */
.score-hero {
  text-align: center; padding: 36px 20px 28px;
}
.score-ring {
  width: 160px; height: 160px; border-radius: 50%;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  background: conic-gradient(var(--acc) calc(var(--pct) * 1%), var(--bg3) 0);
}
.score-ring::before {
  content: ''; position: absolute; inset: 10px;
  border-radius: 50%; background: var(--bg0);
}
.score-num {
  position: relative; z-index: 1;
  font-family: Georgia, serif;
  font-size: 38px; font-weight: 700; text-align: center;
}
.score-grade {
  font-family: Georgia, serif;
  font-size: 24px; font-weight: 700;
  color: var(--acc); margin-bottom: 6px;
}
.habits-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.habit-item { display: flex; gap: 10px; align-items: flex-start; }
.habit-num {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  background: var(--acc-glow); border: 1px solid color-mix(in srgb, var(--acc) 40%, transparent);
  color: var(--acc); font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  font-family: Georgia, serif;
}
.habit-text { font-size: 13.5px; color: var(--t1); line-height: 1.6; }
.habit-text b { color: var(--t0); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 560px) { .grid-2 { grid-template-columns: 1fr; } }

/* ============================================================
   WELCOME HERO
   ============================================================ */
.welcome-hero {
  min-height: calc(100vh - 56px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 50px 20px;
}
.welcome-hero h1 {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 700; line-height: 1.08;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #fff 30%, color-mix(in srgb, var(--acc) 80%, #fff));
  -webkit-background-clip: text; background-clip: text; color: transparent;
  max-width: 680px;
}
.welcome-hero p {
  font-size: 16px; color: var(--t1);
  max-width: 560px; line-height: 1.65; margin-top: 14px;
}
.stat-row { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; margin: 28px 0; }
.stat-item { text-align: center; }
.stat-num {
  font-family: Georgia, serif;
  font-size: 28px; font-weight: 700; color: var(--acc);
}
.stat-label { font-size: 12px; color: var(--t2); margin-top: 2px; }

/* ============================================================
   INSTRUCTION CHIP
   ============================================================ */
.instruction-chip {
  display: inline-flex; align-items: center; gap: 7px;
  background: var(--bg3); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px 14px;
  font-size: 13px; color: var(--t1);
  margin: 14px 0;
}
.instruction-chip b { color: var(--t0); }

/* ============================================================
   ANIMATIONS
   ============================================================ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.fade-in { animation: fadeUp 0.4s ease both; }
.glow-pulse {
  animation: glowPulse 2s ease-in-out infinite;
}
@keyframes glowPulse {
  0%, 100% { box-shadow: 0 0 10px var(--acc-glow); }
  50% { box-shadow: 0 0 22px color-mix(in srgb, var(--acc) 40%, transparent); }
}

/* ============================================================
   UTILITY
   ============================================================ */
.divider { height: 1px; background: var(--line); margin: 22px 0; }
.pill {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 999px;
  font-size: 11.5px; font-weight: 600;
  background: var(--bg3); border: 1px solid var(--line); color: var(--t2);
}
.pill.acc { background: var(--acc-glow); border-color: color-mix(in srgb, var(--acc) 40%, transparent); color: var(--acc); }
.pill.red { background: rgba(255,61,90,0.1); border-color: rgba(255,61,90,0.3); color: var(--red); }
.pill.green { background: rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.3); color: var(--green); }
.step-header { padding: 28px 0 4px; }
.flag-counter {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--t2);
  background: var(--bg3); border: 1px solid var(--line);
  border-radius: 8px; padding: 6px 13px;
  margin-top: 12px;
}
.flag-counter b { color: var(--amber); }

@media (max-width: 600px) {
  .topbar { padding: 10px 14px; }
  .shell { padding: 0 14px 60px; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   DATA — THEMES
   ============================================================ */
const THEMES = {
  claude: {
    name: 'Claude Orange', emoji: '🟠',
    primary: '#ff6b35', light: '#ff9a5c', dark: '#cc4d1a',
    glow: 'rgba(255,107,53,0.16)',
    gradient: 'linear-gradient(135deg,#ff6b35,#ff9a5c)'
  },
  blue: {
    name: 'Electric Blue', emoji: '🔵',
    primary: '#1a7fff', light: '#4da3ff', dark: '#0055cc',
    glow: 'rgba(26,127,255,0.16)',
    gradient: 'linear-gradient(135deg,#1a7fff,#4da3ff)'
  },
  teal: {
    name: 'Deep Teal', emoji: '🩵',
    primary: '#00c2a8', light: '#27dbbf', dark: '#008f7a',
    glow: 'rgba(0,194,168,0.16)',
    gradient: 'linear-gradient(135deg,#00c2a8,#27dbbf)'
  },
  emerald: {
    name: 'Emerald', emoji: '💚',
    primary: '#10b981', light: '#34d399', dark: '#059669',
    glow: 'rgba(16,185,129,0.16)',
    gradient: 'linear-gradient(135deg,#10b981,#34d399)'
  },
  violet: {
    name: 'Violet', emoji: '🟣',
    primary: '#8b5cf6', light: '#a78bfa', dark: '#6d28d9',
    glow: 'rgba(139,92,246,0.16)',
    gradient: 'linear-gradient(135deg,#8b5cf6,#a78bfa)'
  }
};

/* ============================================================

function applyTheme(key) {

  const r = document.documentElement.style;
  r.setProperty('--acc', t.primary);
  r.setProperty('--acc-l', t.light);
  r.setProperty('--acc-d', t.dark);

/* ============================================================

   ============================================================ */
const STEPS = ['theme','welcome','ch1-intro','ch1-article','ch1-identify','ch1-reveal','ch2-intro','ch2-post','ch2-identify','ch2-reveal','dashboard'];

function goTo(step) {
  const app = document.getElementById('app');
  app.style.opacity = '0';
  setTimeout(() => {
    state.step = step;
    renderApp();
    app.style.opacity = '1';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 180);
}

function stepIndex() {
  return STEPS.indexOf(state.step);
}

/* ============================================================
   RENDER TOPBAR
   ============================================================ */
function renderTopbar() {
  const active = stepIndex();
  const showDots = active > 0;
  const labels = ['Theme','Welcome','Headline Intro','Headline Read','Headline Identify','Headline Reveal','Emotion Intro','Post Read','Post Identify','Post Reveal','Dashboard'];
  let dotsHtml = '';
  if (showDots) {
    STEPS.slice(1).forEach((s, i) => {
      const idx = i + 1;
      const cls = idx < active ? 'done' : idx === active ? 'active' : '';
      dotsHtml += `<div class="step-dot ${cls}" title="${labels[idx]}"></div>`;
    });
  }
  return `
  <div class="topbar">
    <div class="tb-brand">
      <div class="tb-mark">M</div>
      <div class="tb-title">Media Integrity Analyzer <span>· Interactive Lesson</span></div>
    </div>
    ${showDots ? `<div class="step-dots">${dotsHtml}</div>` : ''}
  </div>`;
}

function renderCh1Reveal() {
  const h = state.headline;
  state.ch1.revealed = true;
  state.metrics.headlineAccuracy = h.accuracy;
  state.metrics.sourceReliability = h.sourceReliability;

  // Calculate user score for ch1
  const correctlyFlagged = [...state.ch1.flagged].filter(sid => h.misleadingIds.includes(sid)).length;
  const totalMisleading = h.misleadingIds.length;
  const ch1Score = Math.round((correctlyFlagged / totalMisleading) * 50);
  state.userScore += ch1Score;

  const segsHtml = h.segments.map(s => {
    if (!s.clickable) return `<span>${s.text}</span>`;
    const wasFlagged = state.ch1.flagged.has(s.sid);
    const isMisleading = h.misleadingIds.includes(s.sid);
    let cls = '';
    if (isMisleading && wasFlagged) cls = 'reveal-correct';
    else if (isMisleading && !wasFlagged) cls = 'reveal-missed';
    else if (!isMisleading && wasFlagged) cls = 'flagged';
    return `<span class="seg ${cls}">${s.text}</span>`;

  const techsHtml = h.techniques.map(t => `<span class="technique-tag">${t}</span>`).join('');

  const accuracyColor = h.accuracy < 35 ? 'var(--red)' : h.accuracy < 60 ? 'var(--amber)' : 'var(--green)';
  const reliabilityColor = h.sourceReliability < 35 ? 'var(--red)' : h.sourceReliability < 60 ? 'var(--amber)' : 'var(--green)';

  const scoreMsg = correctlyFlagged === totalMisleading
    ? '🎯 Perfect — you found every misleading element'
    : correctlyFlagged > 0
    ? `✓ You found ${correctlyFlagged} of ${totalMisleading} misleading elements`
    : "The answers are highlighted in red below — see if they match your intuition";

  const issuesHtml = h.segments.filter(s => s.misleading).map(s => `
    <div style="padding:10px 0;border-bottom:1px solid var(--line)">

      <div style="font-size:12.5px;color:var(--t1);line-height:1.55">${s.issue}</div>
    </div>
  `).join('');

  return `
  ${renderTopbar()}
  <div class="shell fade-in">
    <div class="step-header">
      <div class="sec-tag">Challenge 1 · Reveal</div>

    </div>

      <div style="display:flex;gap:28px;justify-content:center;flex-wrap:wrap;margin:14px 0">
        <div>
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:4px">Headline Accuracy</div>
          <div style="font-size:44px;font-weight:700;font-family:Georgia,serif;color:${accuracyColor}">${h.accuracy}<span style="font-size:22px">/100</span></div>
        </div>
        <div>
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);margin-bottom:4px">Source Reliability</div>
          <div style="font-size:44px;font-weight:700;font-family:Georgia,serif;color:${reliabilityColor}">${h.sourceReliability}<span style="font-size:22px">/100</span></div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--t2);font-weight:700;margin-bottom:12px">Annotated Headline</div>
      <div class="headline-display">${segsHtml}</div>
      <div class="seg-legend" style="margin-top:12px">
        <span><div class="legend-dot" style="background:rgba(34,197,94,0.4);outline:1px solid rgba(34,197,94,0.6);border-radius:3px"></div> Correctly flagged</span>
        <span><div class="legend-dot" style="background:rgba(255,61,90,0.3);outline:1px dashed rgba(255,61,90,0.6);border-radius:3px"></div> Missed (misleading)</span>
        <span><div class="legend-dot" style="background:rgba(251,191,36,0.3);border-radius:3px"></div> Flagged, but OK</span>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--t2);font-weight:700;margin-bottom:4px">Why Each Phrase Is Misleading</div>
      ${issuesHtml}
    </div>

    <div class="card" style="margin-bottom:18px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--t2);font-weight:700;margin-bottom:8px">Manipulation Techniques Used</div>
      <div class="technique-tags">${techsHtml}</div>
      <div class="divider"></div>

   ============================================================ */
function renderDashboard() {
  const m = state.metrics;
  const score = state.userScore;
  const grade = score >= 85 ? 'A+' : score >= 70 ? 'A' : score >= 55 ? 'B' : score >= 40 ? 'C' : 'D';
  const gradeLabel = score >= 85 ? 'Sharp Media Mind' : score >= 70 ? 'Critical Thinker' : score >= 55 ? 'Developing Awareness' : score >= 40 ? 'Early Learner' : 'Keep Practicing';

  const h = state.headline;
  const p = state.post;

  const mediaIntegrityScore = Math.round(
    (m.headlineAccuracy * 0.3 + m.sourceReliability * 0.3 + (100 - m.emotionalManipulation) * 0.2 + (100 - m.audienceTargeting) * 0.2)
  );

  const habits = [
    {
      title: 'Read the article, not just the headline',
      body: 'Before forming or sharing an opinion, scroll past the headline. The article almost always tells a more nuanced story. If a publication\'s headline dramatically misrepresents its own article, that\'s a credibility signal worth remembering.'
    },
    {
      title: 'Ask "What specific claim is being made here?"',
      body: 'Emotionally powerful content often contains no verifiable claim at all — just feelings, implications, and urgency. If you can\'t identify a specific, checkable assertion, you\'re likely looking at emotional manipulation, not information.'
    },
    {
      title: 'Pause before sharing anything that made you feel strongly',
      body: 'Strong feelings — especially outrage, fear, or moral urgency — are the exact moments content is designed to make you share without thinking. One pause, one check with a reliable source, prevents you from becoming the distribution mechanism for misinformation.'
    }
  ];

  const habitsHtml = habits.map((h, i) => `
    <div class="habit-item">
      <div class="habit-num">${i + 1}</div>
      <div class="habit-text"><b>${h.title}.</b> ${h.body}</div>
    </div>
  `).join('');

  const learnedHtml = [
    `Headlines can be severely misleading even when the article beneath is factual — the <b>${h.techniques[0].toLowerCase()}</b> technique makes ordinary findings sound alarming.`,
    `Social media posts like the one you analyzed are engineered for maximum emotional spread — containing <b>${p.segments.filter(s => s.emotional).length} distinct manipulation triggers</b> in a single post.`,
    `Your media literacy awareness score of <b>${score}/100</b> reflects your ability to notice these patterns — and awareness is the first and most important step.`
  ].map(l => `<div style="display:flex;gap:9px;align-items:flex-start;margin-bottom:10px"><div style="flex-shrink:0;width:6px;height:6px;border-radius:50%;background:var(--acc);margin-top:8px"></div><div style="font-size:13.5px;color:var(--t1);line-height:1.6">${l}</div></div>`).join('');

  const biggestRedFlag = m.emotionalManipulation > m.headlineAccuracy
    ? `The social media post you analyzed used <b>${p.segments.filter(s => s.emotional).length} emotional manipulation techniques</b> in a single post, targeting <b>${p.targetAudience.split(';')[0]}</b>. Content designed this precisely to trigger emotion is almost never designed to inform.`
    : `The headline you analyzed scored only <b>${m.headlineAccuracy}/100 for accuracy</b>. A headline this misleading, on a source with <b>${m.sourceReliability}% reliability</b>, is a combination that can spread significant misinformation at scale.`;

  return `
  ${renderTopbar()}
  <div class="shell fade-in">
    <div class="step-header">
      <div class="sec-tag">Media Integrity Dashboard</div>
      <h2 class="sec-head">Your Lesson Summary</h2>
      <p class="sec-sub">Here's a full breakdown of what you analyzed, what you noticed, and three habits that will protect you in the wild.</p>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div class="score-hero">
        <div class="score-ring" style="--pct:${score}">
          <div class="score-num">${score}</div>
        </div>
        <div class="score-grade">${grade} — ${gradeLabel}</div>
        <div style="font-size:13.5px;color:var(--t1);max-width:420px;margin:0 auto;line-height:1.6">Your Media Literacy Awareness Score — based on misleading elements and emotional triggers you identified across both challenges.</div>
      </div>
    </div>

    <div style="margin-bottom:18px">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--t2);font-weight:700;margin-bottom:12px">Media Integrity Metrics — Content You Analyzed</div>
      <div class="metric-panel">
        <div class="metric-card">
          <div class="metric-label">Headline Accuracy <span style="color:var(--t2);font-weight:400;text-transform:none;font-size:10px">(lower is more misleading)</span></div>
          <div class="metric-value-display" style="color:var(--red)">${m.headlineAccuracy}%</div>
          <div class="bar-track"><div class="bar-fill bar-red" style="width:${m.headlineAccuracy}%"></div></div>
          <div class="metric-sub">Headline was significantly more alarming than the article justified.</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Source Reliability</div>
          <div class="metric-value-display" style="color:var(--red)">${m.sourceReliability}%</div>
          <div class="bar-track"><div class="bar-fill bar-red" style="width:${m.sourceReliability}%"></div></div>
          <div class="metric-sub">No editorial standards board. No verified author credentials.</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Emotional Manipulation <span style="color:var(--t2);font-weight:400;text-transform:none;font-size:10px">(higher = worse)</span></div>
          <div class="metric-value-display" style="color:var(--red)">${m.emotionalManipulation}%</div>
          <div class="bar-track"><div class="bar-fill bar-red" style="width:${m.emotionalManipulation}%"></div></div>
          <div class="metric-sub">Extremely high manipulation density for a single social post.</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Audience Targeting Precision</div>
          <div class="metric-value-display" style="color:var(--amber)">${m.audienceTargeting}%</div>
          <div class="bar-track"><div class="bar-fill bar-amber" style="width:${m.audienceTargeting}%"></div></div>
          <div class="metric-sub">Highly targeted at ${p.targetAudience.split(';')[0].split(',')[0]}.</div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-bottom:18px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--acc);font-weight:700;margin-bottom:14px">What You Learned Today</div>
      ${learnedHtml}
    </div>

    <div class="card card-red" style="margin-bottom:18px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--red);font-weight:700;margin-bottom:10px">🚨 Biggest Red Flag in This Session</div>
      <p style="font-size:14px;color:var(--t0);line-height:1.7">${biggestRedFlag}</p>
    </div>

    <div class="card" style="margin-bottom:28px">
      <div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;color:var(--green);font-weight:700;margin-bottom:16px">Three Media Literacy Habits That Will Protect You</div>
      <div class="habits-list">${habitsHtml}</div>
    </div>

    <div style="text-align:center;padding:20px 0;border-top:1px solid var(--line)">
      <p style="font-size:13.5px;color:var(--t1);margin-bottom:20px">Ready to practice with new scenarios? Every replay generates a different headline and social post.</p>
      <div class="btn-row">
        <button class="btn btn-primary" data-replay="1" style="font-size:15px;padding:14px 32px;">▶ Replay with New Scenarios</button>
        <button class="btn btn-ghost" data-goto="ch1-intro">← Review Challenge 1</button>
      </div>
    </div>
  </div>`;
}

/* ============================================================
   MAIN RENDER FUNCTION
   ============================================================ */
function renderApp() {
  const app = document.getElementById('app');
  switch (state.step) {
    case 'theme':     app.innerHTML = renderThemePicker(); break;
    case 'welcome':   app.innerHTML = renderWelcome(); break;
    case 'ch1-intro': app.innerHTML = renderCh1Intro(); break;
    case 'ch1-article': app.innerHTML = renderCh1Article(); break;
    case 'ch1-identify': app.innerHTML = renderCh1Identify(); break;
    case 'ch1-reveal': app.innerHTML = renderCh1Reveal(); break;
    case 'ch2-intro': app.innerHTML = renderCh2Intro(); break;
    case 'ch2-post':  app.innerHTML = renderCh2Post(); break;
    case 'ch2-identify': app.innerHTML = renderCh2Identify(); break;
    case 'ch2-reveal': app.innerHTML = renderCh2Reveal(); break;
    case 'dashboard': app.innerHTML = renderDashboard(); break;
    default: app.innerHTML = renderThemePicker();
  }
}

/* ============================================================
   SEGMENT TOGGLE (without full re-render)
   ============================================================ */
function toggleSegment(el, challenge) {
  const sid = el.dataset.sid;
  const ch = state[challenge];
  if (ch.flagged.has(sid)) {
    ch.flagged.delete(sid);
    el.classList.remove('flagged');
  } else {
    ch.flagged.add(sid);
    el.classList.add('flagged');
  }
  // Update counter
  const counter = document.querySelector('.flag-counter b');
  if (counter) {
    const count = ch.flagged.size;
    counter.textContent = `${count} segment${count !== 1 ? 's' : ''}`;
    const ready = document.querySelector('.flag-counter span:last-child');
    if (ready) {
      if (count > 0) {
        ready.textContent = '✓ Ready to reveal';
        ready.style.color = 'var(--amber)';
      } else {
        ready.textContent = 'Tap words above to flag them';
        ready.style.color = 'var(--t2)';
      }
    }
  }
  // Update reveal button text
  const revealBtn = document.querySelector('[data-goto="ch1-reveal"].btn-primary,[data-goto="ch2-reveal"].btn-primary');
  if (revealBtn) {
    revealBtn.textContent = ch.flagged.size > 0 ? 'Reveal the Analysis →' : 'Reveal Without Flagging →';
  }
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener('click', function(e) {
  // Theme selection
  const themeOpt = e.target.closest('[data-theme]');
  if (themeOpt) {
    state.theme = themeOpt.dataset.theme;
    applyTheme(state.theme);
    // Update selected state visually
    document.querySelectorAll('.theme-opt').forEach(el => el.classList.remove('selected'));
    themeOpt.classList.add('selected');
    return;
  }

  // Navigation
  const navBtn = e.target.closest('[data-goto]');
  if (navBtn) {
    const target = navBtn.dataset.goto;
    goTo(target);
    return;
  }

  // Replay
  const replayBtn = e.target.closest('[data-replay]');
  if (replayBtn) {
    state.ch1 = { clickResponse: null, flagged: new Set(), revealed: false };
    state.ch2 = { clickResponse: null, flagged: new Set(), revealed: false };
    state.metrics = { headlineAccuracy: 0, sourceReliability: 0, emotionalManipulation: 0, audienceTargeting: 0 };
    state.userScore = 0;
    // Pick new random data
    state.headline = HEADLINES[Math.floor(Math.random() * HEADLINES.length)];
    const remainingPosts = SOCIAL_POSTS.filter(p => p.id !== state.post.id);
    state.post = remainingPosts[Math.floor(Math.random() * remainingPosts.length)];
    goTo('welcome');
    return;
  }

  // Click response (Would you click?)
  const clickOpt = e.target.closest('[data-click-response]');
  if (clickOpt) {
    state.ch1.clickResponse = clickOpt.dataset.clickResponse;
    document.querySelectorAll('.click-opt').forEach(el => el.classList.remove('selected'));
    clickOpt.classList.add('selected');
    return;
  }

  // Emotion button
  const emotionBtn = e.target.closest('[data-emotion]');
  if (emotionBtn) {
    state.ch2.feeling = emotionBtn.dataset.emotion;
    document.querySelectorAll('.emotion-btn').forEach(el => el.classList.remove('selected'));
    emotionBtn.classList.add('selected');
    // Update continue button
    const continueBtn = document.querySelector('[data-goto="ch2-identify"]');
    if (continueBtn) {
      continueBtn.textContent = 'Flag the Emotional Phrases →';
      continueBtn.style.opacity = '1';
    }
    return;
  }

  // Segment click (ch1)
  const segCh1 = e.target.closest('.seg.clickable[data-challenge="ch1"]');
  if (segCh1 && !state.ch1.revealed) {
    toggleSegment(segCh1, 'ch1');
    return;
  }

  // Segment click (ch2)
  const segCh2 = e.target.closest('.seg.clickable[data-challenge="ch2"]');
  if (segCh2 && !state.ch2.revealed) {
    toggleSegment(segCh2, 'ch2');
    return;
  }
});

/* ============================================================
   INIT
   ============================================================ */
function init() {
  // Pick random headline and post
  state.headline = HEADLINES[Math.floor(Math.random() * HEADLINES.length)];
  state.post = SOCIAL_POSTS[Math.floor(Math.random() * SOCIAL_POSTS.length)];

  // Apply default theme
  applyTheme(state.theme);

  // Render
  renderApp();

  // Smooth fade-in
  const app = document.getElementById('app');
  app.style.opacity = '0';
  setTimeout(() => { app.style.opacity = '1'; }, 50);
}

init();
</script>
